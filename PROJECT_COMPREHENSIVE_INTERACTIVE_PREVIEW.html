    function renderTransportPage() {
      const groups = ['نعم','لا','معفى من رسوم النقل'];
      return `
        <div class="toolbar"><div class="title">🚌 النقل المدرسي</div></div>
        <div class="fields">
          ${groups.map(g => `<div class="card-box"><h3>${g}</h3>${state.students.filter(s => s.transportSubscription === g).map(s => `<div class="transport-item"><strong>${s.name}</strong><div class="subtle">${transportSummary(s)}<br>${s.mobile}${transportAccountingNotice(s) ? '<br>' + transportAccountingNotice(s) : ''}</div>${transportAccountingNotice(s) ? `<div class="group-note" style="margin-top:8px;background:#e7f7ee;border-color:#cde8d8;color:#1e7a43">إشعار: ${transportAccountingNotice(s)}</div>` : ''}</div>`).join('') || '<div class="group-note">لا يوجد طلاب في هذه الفئة.</div>'}</div>`).join('')}
        </div>
      `;
    }

    function accountingAvailableSections() {
      const sections = [...new Set(state.students.map(student => studentSectionDisplay(student)).filter(Boolean))]
        .sort((a, b) => {
          if (a === b) return 0;
          if (a === '?') return -1;
          if (b === '?') return 1;
          const aNum = parseInt(a, 10);
          const bNum = parseInt(b, 10);
          if (!Number.isNaN(aNum) && !Number.isNaN(bNum)) return aNum - bNum;
          return String(a).localeCompare(String(b), 'ar');
        });
      return ['الكل', ...sections];
    }

    function accountingMatchesFilters(studentId) {
      const student = state.students.find(item => item.id === studentId);
      if (!student) return false;
      if (state.accountingFilterStudentId !== null && student.id !== state.accountingFilterStudentId) return false;
      if (state.accountingFilterSection !== 'الكل' && studentSectionDisplay(student) !== state.accountingFilterSection) return false;
      return true;
    }

    function accountingFilteredStudents() {
      return state.students.filter(student => {
        if (state.accountingFilterStudentId !== null && student.id !== state.accountingFilterStudentId) return false;
        if (state.accountingFilterSection !== 'الكل' && studentSectionDisplay(student) !== state.accountingFilterSection) return false;
        return true;
      }).sort((a, b) => {
        const sectionCompare = studentSectionDisplay(a).localeCompare(studentSectionDisplay(b), 'ar', { numeric:true });
        if (sectionCompare !== 0) return sectionCompare;
        return a.name.localeCompare(b.name, 'ar');
      });
    }

    function filteredAccountingInstallments() {
      return state.invoices.filter(item => accountingMatchesFilters(item.studentId)).sort((a, b) => {
        const studentA = state.students.find(student => student.id === a.studentId);
        const studentB = state.students.find(student => student.id === b.studentId);
        const bySection = studentSectionDisplay(studentA || {}).localeCompare(studentSectionDisplay(studentB || {}), 'ar', { numeric:true });
        if (bySection !== 0) return bySection;
        const byName = (studentA?.name || '').localeCompare(studentB?.name || '', 'ar');
        if (byName !== 0) return byName;
        return String(b.date || '').localeCompare(String(a.date || ''), 'ar');
      });
    }

    function filteredAccountingDonations() {
      return state.accountingDonations.filter(item => accountingMatchesFilters(item.studentId)).sort((a, b) => {
        const studentA = state.students.find(student => student.id === a.studentId);
        const studentB = state.students.find(student => student.id === b.studentId);
        const bySection = studentSectionDisplay(studentA || {}).localeCompare(studentSectionDisplay(studentB || {}), 'ar', { numeric:true });
        if (bySection !== 0) return bySection;
        const byName = (studentA?.name || '').localeCompare(studentB?.name || '', 'ar');
        if (byName !== 0) return byName;
        return String(b.date || '').localeCompare(String(a.date || ''), 'ar');
      });
    }

    function filteredAccountingAids() {
      return state.accountingAids.filter(item => accountingMatchesFilters(item.studentId)).sort((a, b) => {
        const studentA = state.students.find(student => student.id === a.studentId);
        const studentB = state.students.find(student => student.id === b.studentId);
        const bySection = studentSectionDisplay(studentA || {}).localeCompare(studentSectionDisplay(studentB || {}), 'ar', { numeric:true });
        if (bySection !== 0) return bySection;
        const byName = (studentA?.name || '').localeCompare(studentB?.name || '', 'ar');
        if (byName !== 0) return byName;
        return String(b.date || '').localeCompare(String(a.date || ''), 'ar');
      });
    }

    function accountingScopeText(studentCount) {
      const studentLabel = state.accountingFilterStudentId === null
        ? 'كل الطلاب'
        : (state.students.find(student => student.id === state.accountingFilterStudentId)?.name || 'طالب محدد');
      const sectionLabel = state.accountingFilterSection === 'الكل' ? 'كل الشعب' : `الشعبة ${state.accountingFilterSection}`;
      return `${studentLabel} • ${sectionLabel} • عدد الطلاب الظاهرين: ${studentCount}`;
    }

    function setAccountingStudentFilter(value) {
      if (value === 'all') {
        state.accountingFilterStudentId = null;
        render();
        return;
      }
      state.accountingFilterStudentId = parseInt(value, 10);
      state.accountingFilterSection = 'الكل';
      changeStudent(state.accountingFilterStudentId);
    }

    function setAccountingSectionFilter(value) {
      state.accountingFilterSection = value;
      render();
    }

    function clearAccountingFilters() {
      state.accountingFilterStudentId = null;
      state.accountingFilterSection = 'الكل';
      render();
    }

    function setAccountingView(view) {
      state.accountingView = view;
      render();
    }

    function accountingRecordTile({ title, subtitle, student, pill, icon, accent, soft }) {
      return `
        <div class="record-item">
          <div class="record-icon" style="background:${soft};color:${accent}">${icon}</div>
          <div style="flex:1">
            <strong style="display:block;color:var(--navy-800);font-size:16px;margin-bottom:6px">${title}</strong>
            <div class="subtle">${subtitle}</div>
            <div class="door-tags" style="margin-top:10px">
              <span>${student.name}</span>
              <span>الشعبة ${studentSectionDisplay(student)}</span>
              <span>الصف ${studentGradeDisplay(student)}</span>
            </div>
          </div>
          <div class="record-tail" style="background:${soft};color:${accent}">${pill}</div>
        </div>`;
    }

    function renderAccountingPage() {
      const current = currentStudent();
      const filteredStudents = accountingFilteredStudents();
      const installments = filteredAccountingInstallments();
      const donations = filteredAccountingDonations();
      const aids = filteredAccountingAids();
      const filteredStudentIds = new Set(filteredStudents.map(student => student.id));
      const receipts = state.receipts.filter(item => filteredStudentIds.has(item.studentId));
      const feeDue = filteredStudents.reduce((sum, student) => {
        const entries = student.transportSubscription === 'نعم' ? student.transportFees : student.regularFees;
        return sum + entries.reduce((inner, entry) => inner + (parseFloat(entry.dueAmount || 0) || 0), 0);
      }, 0);
      const feePaid = filteredStudents.reduce((sum, student) => {
        const entries = student.transportSubscription === 'نعم' ? student.transportFees : student.regularFees;
        return sum + entries.reduce((inner, entry) => inner + (parseFloat(entry.paidAmount || 0) || 0), 0);
      }, 0);
      const installmentTotal = installments.reduce((sum, item) => sum + (item.amount || 0), 0);
      const donationTotal = donations.filter(item => item.donationKind === 'مادية').reduce((sum, item) => sum + (item.amount || 0), 0);
      const aidTotal = aids.filter(item => item.aidKind === 'مادية').reduce((sum, item) => sum + (item.amount || 0), 0);
      const receiptTotal = receipts.reduce((sum, item) => sum + (item.amount || 0), 0);
      const totalAmount = feeDue + installmentTotal;
      const paidAmount = feePaid + receiptTotal + donationTotal;
      const netAmount = totalAmount - aidTotal;
      const remaining = netAmount - paidAmount;
      const scope = accountingScopeText(filteredStudents.length);

      let detailTitle = 'شاشة الأقساط المضافة';
      let detailSubtitle = `${scope} • عرض ${installments.length} سجلًا`;
      let detailHtml = installments.length
        ? installments.map(item => {
            const student = state.students.find(student => student.id === item.studentId);
            return accountingRecordTile({
              title: item.title,
              subtitle: `المبلغ: ${item.amount || 0} ${item.currency || ''} • التاريخ: ${item.date || 'بدون تاريخ'}`,
              student,
              pill: 'قسط',
              icon: '◫',
              accent: 'var(--gold-700)',
              soft: 'var(--gold-100)'
            });
          }).join('')
        : '<div class="group-note">لا توجد أقساط مضافة ضمن الفرز الحالي.</div>';
      let detailIcon = '◫';
      let detailSoft = 'var(--gold-100)';
      let detailAccent = 'var(--gold-700)';

      if (state.accountingView === 'donation') {
        detailTitle = 'شاشة التبرعات';
        detailSubtitle = `${scope} • عرض ${donations.length} سجلًا`;
        detailIcon = '♥';
        detailSoft = '#edf6ff';
        detailAccent = 'var(--blue-700)';
        detailHtml = donations.length
          ? donations.map(item => {
              const student = state.students.find(student => student.id === item.studentId);
              const subtitle = item.donationKind === 'عينية'
                ? `عينية • الكمية / العدد: ${item.quantity || '-'} • ${item.date || 'بدون تاريخ'}${item.note ? '<br>' + item.note : ''}`
                : `مادية • ${item.amount || 0} ${item.currency || ''} • ${item.date || 'بدون تاريخ'}`;
              return accountingRecordTile({
                title: item.donationKind === 'عينية' ? (item.materialType || item.title) : item.title,
                subtitle,
                student,
                pill: item.donationKind,
                icon: '♥',
                accent: 'var(--blue-700)',
                soft: '#edf6ff'
              });
            }).join('')
          : '<div class="group-note">لا توجد تبرعات ضمن الفرز الحالي.</div>';
      }

      if (state.accountingView === 'aid') {
        detailTitle = 'شاشة المساعدات والحسومات';
        detailSubtitle = `${scope} • عرض ${aids.length} سجلًا`;
        detailIcon = '✚';
        detailSoft = 'var(--green-100)';
        detailAccent = 'var(--green-700)';
        detailHtml = aids.length
          ? aids.map(item => {
              const student = state.students.find(student => student.id === item.studentId);
              const subtitle = item.aidKind === 'عينية'
                ? `عينية • الكمية: ${item.quantity || '-'} • ${item.date || 'بدون تاريخ'}${item.note ? '<br>' + item.note : ''}`
                : `مادية • ${item.amount || 0} ${item.currency || ''} • ${item.date || 'بدون تاريخ'}`;
              return accountingRecordTile({
                title: item.aidKind === 'عينية' ? (item.materialType || item.title) : item.title,
                subtitle,
                student,
                pill: item.aidKind,
                icon: '✚',
                accent: 'var(--green-700)',
                soft: 'var(--green-100)'
              });
            }).join('')
          : '<div class="group-note">لا توجد مساعدات أو حسومات ضمن الفرز الحالي.</div>';
      }

      const studentFilterValue = state.accountingFilterStudentId === null ? 'all' : String(state.accountingFilterStudentId);
      const sectionOptions = accountingAvailableSections().map(section => `<option value="${section}" ${state.accountingFilterSection===section?'selected':''}>${section === 'الكل' ? 'كل الشعب' : 'الشعبة ' + section}</option>`).join('');

      return `
        <div class="toolbar">
          <div class="title">💰 المحاسبة</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn primary" onclick="state.accountingView='installment'; openAccountingDialog('installment')">إضافة قسط</button>
            <button class="btn soft" onclick="state.accountingView='donation'; openAccountingDialog('donation')">إضافة تبرع</button>
            <button class="btn soft" style="background:#e7f7ee;color:#1e7a43;border-color:#caebd7" onclick="state.accountingView='aid'; openAccountingDialog('aid')">إضافة مساعدة</button>
          </div>
        </div>
        <div class="accounting-hero">
          <div>
            <h3>لوحة المدفوعات الحديثة</h3>
            <p>تم الحفاظ على نفس المعلومات، مع ترتيب بصري أكثر نعومة وانسيابية للأقساط والتبرعات والمساعدات.</p>
          </div>
          <div class="hero-badge">${scope}</div>
        </div>
        <div class="stats" style="grid-template-columns:repeat(5,minmax(0,1fr));margin-bottom:14px">
          <div class="stat"><div><div class="num">${totalAmount.toFixed(0)}</div><div class="label">المبلغ الكلي</div></div><div class="stat-ic c-gold">■</div></div>
          <div class="stat"><div><div class="num">${remaining.toFixed(0)}</div><div class="label">المتبقي</div></div><div class="stat-ic c-rose">⦿</div></div>
          <div class="stat"><div><div class="num">${paidAmount.toFixed(0)}</div><div class="label">المدفوع</div></div><div class="stat-ic c-green">✓</div></div>
          <div class="stat"><div><div class="num">${aidTotal.toFixed(0)}</div><div class="label">الحسم</div></div><div class="stat-ic c-blue">٪</div></div>
          <div class="stat"><div><div class="num">${netAmount.toFixed(0)}</div><div class="label">الصافي</div></div><div class="stat-ic c-blue">≡</div></div>
        </div>
        <div class="panel" style="padding:18px">
          <div class="group-note">تم الاستغناء هنا عن <b>سجل الرسوم الأساسية</b>، وأصبح العرض يعتمد فقط على: <b>قسط</b> و<b>تبرع</b> و<b>مساعدة</b> مع فرز كامل حسب الطالب وحسب الشعبة.</div>
          <div class="fields" style="margin-top:14px">
            <div class="field"><label>الطالب المخصص للإضافة / الاستعراض</label><select onchange="setAccountingStudentFilter(this.value)"><option value="all" ${studentFilterValue==='all'?'selected':''}>كل الطلاب</option>${state.students.map(student => `<option value="${student.id}" ${studentFilterValue===String(student.id)?'selected':''}>${student.name}</option>`).join('')}</select></div>
            <div class="field"><label>فرز حسب الشعبة</label><select onchange="setAccountingSectionFilter(this.value)">${sectionOptions}</select></div>
            <div class="field"><label>الطالب النشط للإدخال</label><div style="padding:12px;border-radius:12px;background:#fbfdff;border:1px solid #d9e7f3;font-weight:800;color:var(--navy-800)">${current.name}</div></div>
            <div class="field"><label>ملخص الفرز الحالي</label><div style="padding:12px;border-radius:12px;background:#fbfdff;border:1px solid #d9e7f3;color:var(--navy-800);line-height:1.8;font-weight:700">${scope}</div><div style="margin-top:10px"><button class="btn soft" onclick="clearAccountingFilters()">إلغاء الفرز</button></div></div>
          </div>
          <div class="payment-type-grid">
            <button class="payment-type-card ${state.accountingView==='installment'?'active':''}" style="${state.accountingView==='installment'?'background:linear-gradient(135deg,var(--gold-700),var(--gold-500))':''}" onclick="setAccountingView('installment')">
              <div class="headline">
                <div>
                  <h3>الأقساط</h3>
                  <p>${state.accountingView==='installment'?'سجل الأقساط النشط حاليًا.':'جميع الأقساط المضافة من داخل باب المحاسبة.'}</p>
                </div>
                <div class="icon-box" style="background:${state.accountingView==='installment'?'rgba(255,255,255,.18)':'var(--gold-100)'};color:${state.accountingView==='installment'?'#fff':'var(--gold-700)'}">◫</div>
              </div>
              <div class="meta">
                <div><small>عدد السجلات</small><div style="font-size:24px;font-weight:900;margin-top:6px">${installments.length}</div></div>
                <div><small>القيمة / الملخص</small><div style="font-size:19px;font-weight:900;margin-top:6px">${installmentTotal.toFixed(0)}</div></div>
              </div>
            </button>
            <button class="payment-type-card ${state.accountingView==='donation'?'active':''}" style="${state.accountingView==='donation'?'background:linear-gradient(135deg,#123a78,#0d1d43)':''}" onclick="setAccountingView('donation')">
              <div class="headline">
                <div>
                  <h3>التبرعات</h3>
                  <p>${state.accountingView==='donation'?'سجل التبرعات النشط حاليًا.':'السجلات المادية والعينية بشكل واضح وعصري.'}</p>
                </div>
                <div class="icon-box" style="background:${state.accountingView==='donation'?'rgba(255,255,255,.18)':'#edf6ff'};color:${state.accountingView==='donation'?'#fff':'var(--blue-700)'}">♥</div>
              </div>
              <div class="meta">
                <div><small>عدد السجلات</small><div style="font-size:24px;font-weight:900;margin-top:6px">${donations.length}</div></div>
                <div><small>القيمة / الملخص</small><div style="font-size:19px;font-weight:900;margin-top:6px">${donationTotal.toFixed(0)} / ${donations.filter(item => item.donationKind === 'عينية').length} عيني</div></div>
              </div>
            </button>
            <button class="payment-type-card ${state.accountingView==='aid'?'active':''}" style="${state.accountingView==='aid'?'background:linear-gradient(135deg,#1e7a43,#2f9a8e)':''}" onclick="setAccountingView('aid')">
              <div class="headline">
                <div>

                </div>

              </div>

                <div><small>عدد السجلات</small><div style="font-size:24px;font-weight:900;margin-top:6px">${aids.length}</div></div>

          <div class="card-box payment-detail-card">
            <div class="headline" style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
              <div>
                <h3 style="margin:0;color:var(--navy-800)">${detailTitle}</h3>
                <p class="subtle" style="margin-top:6px">${detailSubtitle}</p>
              </div>
              <div class="record-icon" style="background:${detailSoft};color:${detailAccent}">${detailIcon}</div>
            </div>
            <div class="record-grid">${detailHtml}</div>
          </div>
        </div>
      `;

      return `

    function inferDocumentCategory(name) {
      const lower = name.toLowerCase();
      if (lower.includes('هوية')) return 'هوية';
      if (lower.includes('شهادة') || lower.endsWith('.pdf')) return 'شهادة';
      if (lower.endsWith('.jpg') || lower.endsWith('.jpeg') || lower.endsWith('.png') || lower.endsWith('.webp')) return 'صورة';
      return 'مستند';
    }

    function buildQrDataUrl(seed) {
      const canvas = document.createElement('canvas');
      const size = 220;
      const cells = 21;
      const cell = Math.floor(size / cells);
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, size, size);
      ctx.fillStyle = '#000000';
      for (let row = 0; row < cells; row++) {
        for (let col = 0; col < cells; col++) {
          const code = seed.charCodeAt((row * cells + col) % seed.length || 0);
          const active = ((code + row * 11 + col * 7) % 5 < 2) || (row < 5 && col < 5) || (row < 5 && col > 15) || (row > 15 && col < 5);
          if (active) ctx.fillRect(col * cell, row * cell, cell - 1, cell - 1);
        }
      }
      return canvas.toDataURL('image/png');
    }

    function barcodeHtml(student) {
      const seed = [student.serial || '0', student.registryNumber || '0', student.id || 0].join('');
      return Array.from({length:56}, (_, index) => {
        const code = seed.charCodeAt(index % seed.length || 0);
        const factor = ((code + index * 5) % 4) + 1;
        const height = 34 + factor * 8;
        const dark = (code + index) % 3 !== 0;
        const width = index % 2 === 0 ? 2.6 : 1.6;
        return `<span style="display:inline-block;width:${width}px;height:${height}px;margin:0 .9px;background:${dark ? '#000' : 'transparent'}"></span>`;
      }).join('');
    }

    function setChoice(key, value) {
      const s = currentStudent();
      if (key === 'gender') s.gender = value;
      else if (key === 'bloodType') s.bloodType = value;
      else if (key === 'enrollmentType') { s.enrollmentType = value; if (value === 'طالب جديد') s.failedGrades = []; }
      else if (key === 'enrollmentGrade') { s.enrollmentGrade = value; if (!s.grade || !String(s.grade).trim()) s.grade = value; }
      else if (key === 'section') s.section = value;
      else if (key === 'transportSubscription') s.transportSubscription = value;
      else if (key === 'healthStatus') {
        s.health.status = value;
        if (value !== 'إعاقة') {
          s.health.visual = false; s.health.hearing = false; s.health.motor = false; s.health.learning = false;
        }
      } else if (key === 'firstLanguage') s.firstLanguage = value;
      else if (key === 'secondLanguage') s.secondLanguage = value;
      else if (key === 'spokenLanguage') s.spokenLanguage = value;
      else if (key.startsWith('fee_')) {
        const parts = key.split('_');
        const field = parts[1];
        const index = parseInt(parts[2], 10);
        const entries = s.transportSubscription === 'نعم' ? s.transportFees : s.regularFees;
        while (entries.length < 10) entries.push({ dueAmount:'', paidAmount:'', currency:'ليرة سورية', paymentDate:'' });
        if (field === 'due') entries[index].dueAmount = value;
        if (field === 'paid') entries[index].paidAmount = value;
        if (field === 'currency') entries[index].currency = value;
        if (field === 'date') entries[index].paymentDate = value;
      }
      render();
    }

    }

    function openInstallmentDialog() {

      function removeDraft(idx) { if (drafts.length === 1) return; drafts.splice(idx,1); renderDialog(); }
      function loadItem(idx) {
        selectedIndex = idx;
        const item = items[idx];
        drafts = [{
          info: item.title || '',
          amount: String(item.amount || ''),
          date: item.date || '2026-06-27',
          currency: ['ليرة سورية','دولار','يورو'].includes(item.currency) ? item.currency : 'أخرى',

      function autofillDraft(idx) {
        if (!drafts[idx].info.trim()) drafts[idx].info = 'معلومات الدفع';

        drafts[idx].date = '2026-06-27';
        drafts[idx].currency = 'ليرة سورية';
        drafts[idx].otherCurrency = '';
        renderDialog();
      }
      function effectiveCurrency(draft) {
        return draft.currency === 'أخرى' ? (draft.otherCurrency || 'أخرى') : draft.currency;
      }
      function payload(draft) {
        return {
          title: (draft.info || '').trim() || 'معلومات الدفع',
          amount: parseFloat(draft.amount || '0') || 0,
          currency: effectiveCurrency(draft),
          date: (draft.date || '').trim() || '2026-06-27'
        };
      }
      function renderDraftCard(draft, idx) {
        return `
          <div class="card-box" style="margin-bottom:12px;background:#f7f3ea;border-color:#e8ddbf">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px">

              ${drafts.length > 1 ? `<button class="btn danger" type="button" onclick="window.__removeInstallmentDraft(${idx})">حذف القالب</button>` : ''}
            </div>
            <div class="fields">
              <div class="field span-2"><label>معلومات الدفع</label><input type="text" value="${escapeHtml(draft.info)}" oninput="window.__installmentDrafts[${idx}].info=this.value"></div>
              <div class="field"><label>المبلغ</label><input type="text" inputmode="decimal" value="${escapeHtml(draft.amount)}" oninput="window.__installmentDrafts[${idx}].amount=this.value"></div>
              <div class="field"><label>التاريخ</label><input type="date" value="${escapeHtml(draft.date)}" oninput="window.__installmentDrafts[${idx}].date=this.value"></div>
              <div class="field span-2"><label>العملة</label><div class="choice-wrap">${['ليرة سورية','دولار','يورو','أخرى'].map(opt=>`<button type="button" class="choice ${draft.currency===opt?'active':''}" onclick="window.__setInstallmentCurrency(${idx}, '${opt}')">${opt}</button>`).join('')}</div>${draft.currency==='أخرى' ? `<input type="text" placeholder="أدخل العملة الأخرى" value="${escapeHtml(draft.otherCurrency)}" style="margin-top:10px" oninput="window.__installmentDrafts[${idx}].otherCurrency=this.value">` : ''}</div>
            </div>
          </div>`;
      }
      function renderDialog() {
        window.__installmentDrafts = drafts;
        popup.innerHTML = `
          <div class="modal-card">
            <div class="modal-head"><div><h3>إضافة قسط</h3><p>${s.name}</p></div><button class="close" onclick="this.closest('.modal').remove()">✕</button></div>
            <div class="modal-body">
              ${items.length ? `<div style="display:grid;gap:8px;margin-bottom:14px">${items.map((item,idx)=>`<button class="opt" onclick="window.__loadInstallmentItem(${idx})"><div><b>${item.title}</b><small>${item.amount} ${item.currency} • ${item.date}</small></div><span>${selectedIndex===idx?'✓':'◂'}</span></button>`).join('')}</div>` : ''}
              ${drafts.map((draft,idx)=>renderDraftCard(draft, idx)).join('')}
              <button class="btn soft" type="button" onclick="window.__addInstallmentDraft()">إضافة قالب دفع</button>
            </div>
            <div style="padding:0 20px 20px;display:flex;gap:8px;justify-content:flex-end">
              <button class="btn primary" onclick="window.__saveInstallment()">حفظ</button>

              <button class="btn danger" onclick="window.__deleteInstallment()">حذف</button>
            </div>
          </div>`;
      }
      window.__addInstallmentDraft = addDraft;
      window.__removeInstallmentDraft = removeDraft;
      window.__loadInstallmentItem = loadItem;
      window.__setInstallmentCurrency = (idx,opt) => { drafts[idx].currency = opt; if (opt !== 'أخرى') drafts[idx].otherCurrency = ''; renderDialog(); };
      window.__autofillInstallmentDraft = autofillDraft;
      window.__saveInstallment = () => {
        const validDrafts = drafts.filter(d => (d.info || '').trim() || String(d.amount || '').trim());
        if (!validDrafts.length) { toast('أضف قالب دفع واحدًا على الأقل قبل الحفظ.', '#a76727'); return; }
        validDrafts.forEach(d => state.invoices.unshift({ studentId:s.id, ...payload(d) }));
        popup.remove(); render(); toast(`تم حفظ ${validDrafts.length} قالب/قوالب قسط بنجاح.`, '#2e7d46');
      };
      window.__editInstallment = () => {
        if (selectedIndex < 0) { toast('اختر سجلًا أولًا للتعديل.', '#a76727'); return; }
        Object.assign(items[selectedIndex], payload(drafts[0]));
        popup.remove(); render(); toast('تم تعديل القسط بنجاح.', '#2e7d46');
      };
      window.__deleteInstallment = () => {
        if (selectedIndex < 0) { toast('اختر سجلًا أولًا للحذف.', '#c65c54'); return; }
        const item = items[selectedIndex]; state.invoices = state.invoices.filter(i => i !== item);
        popup.remove(); render(); toast('تم حذف القسط بنجاح.', '#c65c54');
      };
      popup.addEventListener('click', (e)=>{ if(e.target===popup) popup.remove(); });
      document.body.appendChild(popup);
      renderDialog();
    }

    function openMoneyOrInKindDialog(kind, entryKind) {
      const s = currentStudent();
      const collection = kind === 'donation' ? state.accountingDonations.filter(i => i.studentId === s.id) : state.accountingAids.filter(i => i.studentId === s.id);
      let selectedIndex = -1;
      let drafts = [{ info:'', amount:'', date:'2026-06-27', currency:'ليرة سورية', otherCurrency:'' }];
      const popup = document.createElement('div');
      popup.className = 'modal';

      const inKindDraft = { materialType:'', quantity:'', date:'2026-06-27', note:'' };

      function loadItem(idx) {
        selectedIndex = idx;
        const item = collection[idx];
        if (entryKind === 'مادية') {
          drafts = [{
            info: item.title || '',
            amount: String(item.amount || ''),
            date: item.date || '2026-06-27',
            currency: ['ليرة سورية','دولار','يورو'].includes(item.currency) ? item.currency : 'أخرى',
            otherCurrency: ['ليرة سورية','دولار','يورو'].includes(item.currency) ? '' : (item.currency || ''),
          }];
        } else {
          inKindDraft.materialType = item.materialType || '';
          inKindDraft.quantity = item.quantity || '';
          inKindDraft.date = item.date || '2026-06-27';
          inKindDraft.note = item.note || '';
        }
        renderDialog();
      }
      function addDraft() { drafts.push({ info:'', amount:'', date:'2026-06-27', currency:'ليرة سورية', otherCurrency:'' }); renderDialog(); }
      function removeDraft(idx) { if (drafts.length === 1) return; drafts.splice(idx,1); renderDialog(); }
      function autofillDraft(idx) {
        if (!drafts[idx].info.trim()) drafts[idx].info = 'معلومات الدفع';
        if (!String(drafts[idx].amount).trim()) drafts[idx].amount = '0';
        drafts[idx].date = '2026-06-27';
        drafts[idx].currency = 'ليرة سورية';
        drafts[idx].otherCurrency = '';
        renderDialog();
      }
      function effectiveCurrency(draft) { return draft.currency === 'أخرى' ? (draft.otherCurrency || 'أخرى') : draft.currency; }
      function moneyPayload(draft) {
        return {
          title: (draft.info || '').trim() || 'معلومات الدفع',
          amount: parseFloat(draft.amount || '0') || 0,
          currency: effectiveCurrency(draft),
          date: (draft.date || '').trim() || '2026-06-27',
          materialType:'', quantity:'', note:''
        };
      }
      function renderMoneyDraft(draft, idx) {
        return `
          <div class="card-box" style="margin-bottom:12px;background:#f7f3ea;border-color:#e8ddbf">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px">
              <strong style="color:#a76727">قالب الدفع ${idx + 1}</strong>
              ${drafts.length > 1 ? `<button class="btn danger" type="button" onclick="window.__removeMoneyDraft(${idx})">حذف القالب</button>` : ''}
            </div>
            <div class="fields">
              <div class="field span-2"><label>معلومات الدفع</label><input type="text" value="${escapeHtml(draft.info)}" oninput="window.__moneyDrafts[${idx}].info=this.value"></div>
              <div class="field"><label>المبلغ</label><input type="text" inputmode="decimal" value="${escapeHtml(draft.amount)}" oninput="window.__moneyDrafts[${idx}].amount=this.value"></div>
              <div class="field"><label>التاريخ</label><input type="date" value="${escapeHtml(draft.date)}" oninput="window.__moneyDrafts[${idx}].date=this.value"></div>
              <div class="field span-2"><label>العملة</label><div class="choice-wrap">${['ليرة سورية','دولار','يورو','أخرى'].map(opt=>`<button type="button" class="choice ${draft.currency===opt?'active':''}" onclick="window.__setMoneyDraftCurrency(${idx}, '${opt}')">${opt}</button>`).join('')}</div>${draft.currency==='أخرى' ? `<input type="text" placeholder="أدخل العملة الأخرى" value="${escapeHtml(draft.otherCurrency)}" style="margin-top:10px" oninput="window.__moneyDrafts[${idx}].otherCurrency=this.value">` : ''}</div>
            </div>
          </div>`;
      }
      function renderDialog() {
        window.__moneyDrafts = drafts;
        popup.innerHTML = `
          <div class="modal-card">
            <div class="modal-head"><div><h3>${kind === 'donation' ? 'إضافة تبرع' : 'إضافة مساعدة'} ${entryKind}</h3><p>${s.name}</p></div><button class="close" onclick="this.closest('.modal').remove()">✕</button></div>
            <div class="modal-body">
              ${collection.length ? `<div style="display:grid;gap:8px;margin-bottom:14px">${collection.map((item,idx)=>`<button class="opt" onclick="window.__loadMoneyOrInKindItem(${idx})"><div><b>${item.title}</b><small>${entryKind === 'عينية' ? ((item.materialType || item.title) + ' • ' + (item.quantity || '-') + ' • ' + item.date) : ((item.amount || 0) + ' ' + (item.currency || '') + ' • ' + item.date)}</small></div><span>${selectedIndex===idx?'✓':'◂'}</span></button>`).join('')}</div>` : ''}
              ${entryKind === 'مادية' ? `${drafts.map((draft,idx)=>renderMoneyDraft(draft, idx)).join('')}<button class="btn soft" type="button" onclick="window.__addMoneyDraft()">إضافة قالب دفع</button>` : `<div class="fields"><div class="field span-2"><label>نوع المادة</label><input type="text" value="${escapeHtml(inKindDraft.materialType)}" oninput="window.__inKindDraft.materialType=this.value"></div><div class="field"><label>الكمية</label><input type="number" value="${escapeHtml(inKindDraft.quantity)}" oninput="window.__inKindDraft.quantity=this.value"></div><div class="field"><label>التاريخ</label><input type="date" value="${escapeHtml(inKindDraft.date)}" oninput="window.__inKindDraft.date=this.value"></div><div class="field span-2"><label>ملاحظات</label><textarea oninput="window.__inKindDraft.note=this.value">${escapeHtml(inKindDraft.note)}</textarea></div></div>`}
            </div>
            <div style="padding:0 20px 20px;display:flex;gap:8px;justify-content:flex-end"><button class="btn primary" onclick="window.__saveMoneyOrInKindItem()">حفظ</button><button class="btn soft" onclick="window.__editMoneyOrInKindItem()">تعديل</button><button class="btn danger" onclick="window.__deleteMoneyOrInKindItem()">حذف</button></div>
          </div>`;
      }
      window.__inKindDraft = inKindDraft;
      window.__loadMoneyOrInKindItem = loadItem;
      window.__addMoneyDraft = addDraft;
      window.__removeMoneyDraft = removeDraft;
      window.__setMoneyDraftCurrency = (idx,opt) => { drafts[idx].currency = opt; if (opt !== 'أخرى') drafts[idx].otherCurrency = ''; renderDialog(); };
      window.__autofillMoneyDraft = autofillDraft;
      window.__saveMoneyOrInKindItem = () => {
        if (entryKind === 'مادية') {
          const validDrafts = drafts.filter(d => (d.info || '').trim() || String(d.amount || '').trim());
          if (!validDrafts.length) { toast('أضف قالب دفع واحدًا على الأقل قبل الحفظ.', '#a76727'); return; }
          validDrafts.forEach(d => {
            const data = moneyPayload(d);
            if (kind === 'donation') state.accountingDonations.unshift({ studentId:s.id, donationKind: entryKind, ...data });
            else state.accountingAids.unshift({ studentId:s.id, aidKind: entryKind, ...data });
          });
          popup.remove(); render(); toast(`تم حفظ ${validDrafts.length} قالب/قوالب بنجاح.`, '#2e7d46');
          return;
        }
        const data = {
          title: inKindDraft.materialType || (kind === 'donation' ? 'تبرع عيني' : 'مساعدة عينية'),
          amount:0, currency:'', date: inKindDraft.date || '2026-06-27', materialType:inKindDraft.materialType || '', quantity:inKindDraft.quantity || '', note:inKindDraft.note || ''
        };
        if (kind === 'donation') state.accountingDonations.unshift({ studentId:s.id, donationKind: entryKind, ...data });
        else state.accountingAids.unshift({ studentId:s.id, aidKind: entryKind, ...data });
        popup.remove(); render(); toast('تم حفظ السجل بنجاح.', '#2e7d46');
      };
      window.__editMoneyOrInKindItem = () => {
        if (selectedIndex < 0) { toast('اختر سجلًا أولًا للتعديل.', '#a76727'); return; }
        if (entryKind === 'مادية') {
          const data = moneyPayload(drafts[0]);
          if (kind === 'donation') Object.assign(collection[selectedIndex], { donationKind: entryKind, ...data });
          else Object.assign(collection[selectedIndex], { aidKind: entryKind, ...data });
          popup.remove(); render(); toast('تم تعديل السجل بنجاح.', '#2e7d46');
          return;
        }
        const data = {
          title: inKindDraft.materialType || (kind === 'donation' ? 'تبرع عيني' : 'مساعدة عينية'),
          amount:0, currency:'', date: inKindDraft.date || '2026-06-27', materialType:inKindDraft.materialType || '', quantity:inKindDraft.quantity || '', note:inKindDraft.note || ''
        };
        if (kind === 'donation') Object.assign(collection[selectedIndex], { donationKind: entryKind, ...data });
        else Object.assign(collection[selectedIndex], { aidKind: entryKind, ...data });
        popup.remove(); render(); toast('تم تعديل السجل بنجاح.', '#2e7d46');
      };
      window.__deleteMoneyOrInKindItem = () => {
        if (selectedIndex < 0) { toast('اختر سجلًا أولًا للحذف.', '#c65c54'); return; }
        const item = collection[selectedIndex];
        if (kind === 'donation') state.accountingDonations = state.accountingDonations.filter(i => i !== item);
        else state.accountingAids = state.accountingAids.filter(i => i !== item);
        popup.remove(); render(); toast('تم حذف السجل بنجاح.', '#c65c54');
      };
      popup.addEventListener('click', (e)=>{ if(e.target===popup) popup.remove(); });
      document.body.appendChild(popup);
      renderDialog();
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function saveStudent() {
      toast('تمت العملية بنجاح: حفظ بيانات الطالب.', '#2e7d46');
      state.page = 'students';
      render();
    }

    function deleteStudent() {
      if (!state.selectedStudentId) return;
      state.students = state.students.filter(s => s.id !== state.selectedStudentId);
      state.selectedStudentId = state.students.length ? state.students[0].id : null;
      toast('تمت العملية بنجاح: حذف السجل.', '#c65c54');
      state.page = 'students';
      render();
    }

    function createNewStudent() {
      const id = Date.now();
      const student = {
        id,
        serial: 'RS-2026-' + String(state.students.length + 1).padStart(4, '0'),
        name: '', fatherName: '', motherName: '', grandfather: '', gender: 'ذكر', religion: 'إسلامية', bloodType: '?',
        birthPlace: '', birthDate: '', registryPlace: '', registryNumber: '',
        enrollmentDate: '', enrollmentType: 'طالب جديد', enrollmentGrade: '1', grade: '1', section: '?', schoolYear: currentAcademicYear(), previousSchool: '', failedGrades: [],
        firstLanguage: 'E', firstLanguageOther: '', secondLanguage: 'E', secondLanguageOther: '', spokenLanguage: 'E', spokenLanguageOther: '',
        residence: '', landline: '', mobile: '', guardianMobile: '', email: '', transportSubscription: 'نعم', transportGathering: '',
        social: { normalLife: true, orphanFather: false, orphanMother: false, orphanParents: false, onlyChild: false, livesSeparate: false },
        hobbies: { music: false, drawing: false, computer: false, sports: false, other: '' },
        initiatives: { school: false, financial: false, kind: false, projects: false },
        health: { status: 'سليم', visual: false, hearing: false, motor: false, learning: false, notes: '' },
        guardianName: '', guardianRelation: '', guardianPhone: '', guardianMobile:'', guardianWhatsapp:'', guardianEmail:'', guardianWork: '', guardianAddress: '', emergencyContactName: '', emergencyContactPhone: '',
        attachments: [], messages: [], photoDataUrl:'', photoFileName:'', qrDataUrl:'', qrFileName:''
      };
      state.students.unshift(student);
      state.selectedStudentId = id;
      state.page = 'form';
      render();
      toast('تم فتح استمارة طالب جديد.', '#a76727');
    }

    function addAttachment() {
      const s = currentStudent();
      s.attachments.unshift({ title: `مرفق جديد ${s.attachments.length + 1}`, category: 'مستند', note: 'تمت إضافته من المعاينة التفاعلية.', originalName: '' });
      render();
      toast('تمت إضافة مرفق جديد بنجاح.', '#2e7d46');
    }

    function removeAttachment(index) {
      const s = currentStudent();
      s.attachments.splice(index, 1);
      render();
      toast('تم حذف المرفق بنجاح.', '#c65c54');
    }

    function addInvoice() {
      const s = currentStudent();
      state.invoices.unshift({ studentId:s.id, title:'فاتورة جديدة', amount:100, currency:'ليرة سورية', date:'2026-06-27' });
      render();
      toast('تمت إضافة فاتورة جديدة بنجاح.', '#2e7d46');
    }

    function addReceipt() {
      const s = currentStudent();
      state.receipts.unshift({ studentId:s.id, title:'مقبوض جديد', amount:50, currency:'ليرة سورية', date:'2026-06-27', note:'تمت إضافته من المعاينة التفاعلية.' });
      render();
      toast('تمت إضافة مقبوض جديد بنجاح.', '#2e7d46');
    }

    function createBackup() {
      const now = new Date();
      const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
      state.backups.unshift({
        name: `backup_demo_${stamp}.zip`,
        createdAt: `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,
        fileCount: 170 + state.students.length + currentStudent().attachments.length,
        studentCount: state.students.length,
        note: 'نسخة تم إنشاؤها من المعاينة التفاعلية.'
      });
      render();
      toast('تم إنشاء نسخة احتياطية جديدة بنجاح.', '#2e7d46');
    }

    function showParentInvitationDialog() {
      const s = currentStudent();
      let selectedStudentId = s.id;
      let messageType = 'مراسلة الكترونية';
      const popup = document.createElement('div');
      popup.className = 'modal';
      function renderDialog() {
        const current = state.students.find(st => st.id === selectedStudentId) || s;
        popup.innerHTML = `
          <div class="modal-card">
            <div class="modal-head"><div><h3>دعوة ولي / أولياء الأمور</h3><p>${current.name}</p></div><button class="close" onclick="this.closest('.modal').remove()">✕</button></div>
            <div class="modal-body">
              <div class="field span-2"><label>نوع المراسلة</label><div class="choice-wrap"><button type="button" class="choice ${messageType==='مراسلة الكترونية'?'active':''}" onclick="window.__setMessageType('مراسلة الكترونية')">مراسلة الكترونية</button><button type="button" class="choice ${messageType==='مراسلة ورقية'?'active':''}" onclick="window.__setMessageType('مراسلة ورقية')">مراسلة ورقية</button></div></div>
              <div class="fields" style="margin-top:12px">
                <div class="field span-2"><label>اختيار الطالب</label><select id="msgStudentSelect">${state.students.map(st => `<option value="${st.id}" ${st.id===current.id?'selected':''}>${st.name}</option>`).join('')}</select></div>
                <div class="field span-2"><label>سبب الدعوة</label><input id="msgReasonInput" type="text"></div>
                <div class="field"><label>التاريخ</label><input id="msgDateInput" type="date" value="2026-06-27"></div>
                <div class="field"><label>الساعة</label><input id="msgTimeInput" type="time" value="10:00"></div>
                <div class="field"><label>ايميل ولي الأمر</label><input id="msgEmailInput" type="email" value="${current.guardianEmail || ''}"></div>
                <div class="field"><label>رقم وتس الاب لولي الأمر</label><input id="msgWhatsappInput" type="text" value="${current.guardianWhatsapp || ''}"></div>
                <div class="field span-2"><label>مضمون الدعوة</label><textarea id="msgBodyInput">يرجى مراجعة إدارة المدرسة.</textarea></div>
              </div>
              ${messageType==='مراسلة ورقية' ? `<div class="card-box" style="margin-top:16px"><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px"><div class="logo" style="width:54px;height:54px"><img src="image/logo.jpg" alt="logo" onerror="this.onerror=null;this.src='assets/logo.jpg'; if(!this.complete||this.naturalWidth===0){this.src='logo.jpg';}"></div><div><div style="font-weight:800;color:var(--navy-800)">مدرسة روز التعليمية</div><div class="subtle">دعوة ولي / أولياء الأمور</div></div></div><div class="subtle">الخاتم والتوقيع يظهران في أسفل البطاقة عند الطباعة.</div><div style="display:flex;justify-content:space-between;margin-top:18px"><span class="subtle">الخاتم</span><span class="subtle">التوقيع</span></div></div>` : ''}
            </div>
            <div style="padding:0 20px 20px;display:flex;gap:8px;justify-content:flex-end"><button class="btn primary" onclick="window.__sendMessageInvitation()">إرسال</button><button class="btn soft" onclick="window.__printMessageInvitation()">طباعة</button></div>
          </div>`;
        popup.querySelector('#msgStudentSelect')?.addEventListener('change', (e) => { selectedStudentId = parseInt(e.target.value, 10); renderDialog(); });
      }
      window.__setMessageType = (type) => { messageType = type; renderDialog(); };
      window.__sendMessageInvitation = () => {
        const current = state.students.find(st => st.id === selectedStudentId) || s;
        current.messages.unshift({
          subject: 'دعوة ولي / أولياء الأمور',
          type: messageType,
          body: popup.querySelector('#msgBodyInput')?.value || 'يرجى مراجعة إدارة المدرسة.',
          date: popup.querySelector('#msgDateInput')?.value || '2026-06-27',
          time: popup.querySelector('#msgTimeInput')?.value || '',
          reason: popup.querySelector('#msgReasonInput')?.value || '',
          guardianEmail: popup.querySelector('#msgEmailInput')?.value || '',
          guardianWhatsapp: popup.querySelector('#msgWhatsappInput')?.value || ''
        });
        popup.remove(); render(); toast('تم إرسال المراسلة بنجاح.', '#2e7d46');
      };
      window.__printMessageInvitation = () => { toast('تم تجهيز الدعوة للطباعة.', '#214f9a'); };
      popup.addEventListener('click', (e)=>{ if(e.target===popup) popup.remove(); });
      document.body.appendChild(popup);
      renderDialog();
    }

    function changeStudent(id) {
      state.selectedStudentId = id;
      render();
    }

    function showStudentActions(id) {
      const student = state.students.find(s => s.id === id);
      if (student) showKnowledgeDialog(student);
    }

    document.querySelectorAll('.menu-item').forEach(btn => {
      btn.addEventListener('click', () => {
        const page = btn.dataset.page;
        const doorKey = doorKeyForPage(page);
        const user = currentAuthenticatedUser();
        if (!user || !userHasPermissionForDoor(user, doorKey)) {
          requestDoorAccess(doorKey, page);
          return;
        }
        state.page = page;
        render();
      });
    });

    document.querySelectorAll('.nav-head').forEach(btn => {
      btn.addEventListener('click', () => requestDoorAccess(btn.dataset.group));
    });

    el('searchInput').addEventListener('input', (e) => {
      state.search = e.target.value;
      render();
    });

    el('searchInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        state.search = e.target.value;
        handleSearch();
      }
    });

    render();
  </script>
</body>
</html>
