<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rose School 2026 - Secretariat Interactive Demo</title>
  <style>
    :root {
      --navy-950:#0a1633; --navy-900:#0d1d43; --navy-800:#10295a; --navy-700:#12356f;
      --gold-700:#a76727; --gold-600:#b97a33; --gold-500:#cd9045; --gold-200:#efd7ad; --gold-100:#f7ecd7;
      --green-700:#1e7a43; --green-100:#e7f7ee;
      --rose-700:#a82a38; --rose-100:#fde8ec;
      --blue-700:#123a78; --blue-100:#e9f2ff;
      --line:#e6ebf3; --text:#20293a; --muted:#7b8897; --white:#fff;
      --sky-100:#eef8ff; --sky-200:#dceffc; --shadow:0 14px 32px rgba(20,40,90,.10);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg,var(--sky-100) 0%,var(--sky-200) 100%);
    }
    button, input, select, textarea { font: inherit; }
    .app { min-height: 100vh; display: grid; grid-template-columns: minmax(0,1fr) 310px; }
    .content {
      padding: 22px;
      background: radial-gradient(circle at top left, rgba(255,255,255,.45), transparent 24%), linear-gradient(180deg,var(--sky-100) 0%,var(--sky-200) 100%);
    }
    .content-shell {
      min-height: calc(100vh - 44px);
      padding: 16px;
      border-radius: 28px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.44);
      backdrop-filter: blur(6px);
    }
    .sidebar {
      padding: 22px 18px;
      background: linear-gradient(180deg,#16120f 0%, #0f1f4a 35%, #0e2f73 100%);
      color: #fff;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    .brand { display:flex; justify-content:space-between; align-items:center; gap:14px; margin-bottom:24px; }
    .brand h1 { font-size:18px; line-height:1.6; margin:0; font-weight:800; }
    .brand h1 b { color:#d4a95f; }
    .brand small { display:block; margin-top:4px; color:rgba(255,255,255,.72); font-size:12px; }
    .logo { width:60px; height:60px; border-radius:50%; border:2px solid rgba(255,255,255,.45); overflow:hidden; background:rgba(255,255,255,.08); box-shadow:0 10px 22px rgba(0,0,0,.18); }
    .logo img { width:100%; height:100%; object-fit:cover; }
    .menu-title { margin:20px 4px 12px; font-size:15px; font-weight:800; color:rgba(255,255,255,.9); }
    .menu-item {
      width:100%; border:0; background:transparent; color:rgba(255,255,255,.84);
      text-align:right; padding:12px 14px; border-radius:14px; cursor:pointer;
      display:flex; justify-content:space-between; align-items:center; gap:10px; transition:.18s ease;
      margin-bottom:7px;
    }
    .menu-item:hover { background:linear-gradient(90deg,rgba(169,103,39,.28),rgba(205,144,69,.16)); color:#fff; }
    .menu-item.active { background:linear-gradient(90deg,rgba(169,103,39,.95),rgba(205,144,69,1)); color:#fff; font-weight:800; box-shadow:0 10px 20px rgba(0,0,0,.18); }
    .nav-group { margin-bottom:14px; }
    .nav-head { width:100%; border:0; color:#fff; padding:13px 14px; border-radius:16px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; font-weight:800; box-shadow:0 10px 20px rgba(0,0,0,.18); }
    .nav-body { display:none; margin-top:8px; margin-right:10px; padding-right:10px; border-right:2px solid rgba(255,255,255,.18); }
    .nav-body.open { display:block; }
    .top { display:flex; justify-content:space-between; align-items:flex-start; gap:18px; flex-wrap:wrap; margin-bottom:16px; }
    .search { position:relative; width:320px; max-width:100%; }
    .search input {
      width:100%; border:0; outline:none; border-radius:18px; background:rgba(255,255,255,.95);
      padding:15px 18px 15px 50px; box-shadow:var(--shadow); color:var(--text);
    }
    .search .icon {
      position:absolute; left:14px; top:50%; transform:translateY(-50%);
      width:32px; height:32px; border-radius:50%; display:grid; place-items:center;
      background:#eff6ff; color:var(--navy-700);
    }
    .head { text-align:right; }
    .head .sub { font-size:13px; color:#6f7d8e; margin-bottom:6px; }
    .head h2 { margin:0; font-size:40px; line-height:1.1; color:var(--navy-900); font-weight:800; }
    .hint {
      background:rgba(247,236,214,.92); border:1px solid rgba(201,160,78,.42);
      border-radius:16px; padding:14px 16px; color:#7b5830; line-height:1.8; margin-bottom:16px;
    }
    .stats { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; margin-bottom:16px; }
    .stat {
      background:rgba(255,255,255,.95); border:1px solid var(--line); border-radius:22px;
      padding:16px 18px; display:flex; justify-content:space-between; align-items:center; gap:12px; box-shadow:var(--shadow);
    }
    .stat .num { font-size:36px; font-weight:800; line-height:1; }
    .stat .label { margin-top:8px; color:var(--muted); font-size:14px; }
    .stat-ic { width:44px; height:44px; border-radius:14px; color:#fff; display:grid; place-items:center; font-weight:800; }
    .c-rose { background:linear-gradient(135deg,var(--rose-700),#7e1f2a); }
    .c-blue { background:linear-gradient(135deg,var(--blue-700),#0e2f66); }
    .c-green { background:linear-gradient(135deg,var(--green-700),#166534); }
    .c-gold { background:linear-gradient(135deg,var(--gold-500),var(--gold-700)); }
    .panel {
      background:rgba(255,255,255,.95); border:1px solid var(--line); border-radius:22px;
      box-shadow:var(--shadow); overflow:hidden;
    }
    .panel + .panel { margin-top:14px; }
    .toolbar { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
    .title { font-size:19px; font-weight:800; color:var(--navy-800); }
    .btn {
      border:0; border-radius:14px; padding:12px 18px; cursor:pointer; font-weight:800; transition:.18s ease;
    }
    .btn:hover { transform:translateY(-1px); }
    .btn.primary { background:linear-gradient(135deg,var(--gold-700),var(--gold-500)); color:#fff; }
    .btn.soft { background:#edf6ff; color:#24436f; border:1px solid #d5e6f5; }
    .btn.danger { background:linear-gradient(135deg,#d46a63,#bf514a); color:#fff; }
    .table-wrap { overflow:hidden; }
    table { width:100%; border-collapse:collapse; }
    thead th { padding:15px 12px; background:linear-gradient(180deg,#132556 0%,#0f1f45 100%); color:#fff; font-size:14px; }
    tbody td { padding:15px 12px; border-bottom:1px solid #edf3f8; text-align:center; background:#fff; }
    tbody tr:last-child td { border-bottom:0; }
    tbody tr:hover td { background:linear-gradient(180deg,#fffdf8 0%,#fdf7ef 100%); }
    .student { display:flex; align-items:center; gap:12px; text-align:right; }
    .avatar { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,#1d4d9c,#377fd8); color:#fff; display:grid; place-items:center; font-weight:800; flex-shrink:0; overflow:hidden; }
    .student strong { display:block; margin-bottom:4px; }
    .student small { display:block; color:#8a95a3; line-height:1.55; }
    .status { display:inline-flex; padding:7px 10px; border-radius:999px; font-size:12px; font-weight:800; }
    .status.active { background:var(--green-100); color:var(--green-700); }
    .status.stop { background:#fde9e8; color:#c05d57; }
    .actions { display:flex; justify-content:center; gap:8px; }
    .icon-btn { width:32px; height:32px; border-radius:50%; border:1px solid #e2ebf2; background:#fff; cursor:pointer; position:relative; transition:.18s ease; }
    .icon-btn:hover { border-color:var(--gold-700); box-shadow:0 0 0 4px rgba(167,103,39,.16); transform:translateY(-1px); }
    .full-layout { display:grid; grid-template-columns: 1fr; gap:14px; }
    .card-box { background:#fff; border:1px solid var(--line); border-radius:18px; padding:16px; }
    .card-box h3 { margin:0 0 12px; color:var(--navy-800); font-size:18px; }
    .fields { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
    .field { background:#fff; border:1px solid #e1ebf3; border-radius:16px; padding:12px 14px; }
    .field.span-2 { grid-column:span 2; }
    .field label { display:block; color:#7e8d9d; font-size:12px; margin-bottom:8px; font-weight:800; }
    .field input, .field select, .field textarea {
      width:100%; border:1px solid #d9e7f3; border-radius:12px; padding:11px 12px; outline:none; background:#fbfdff;
    }
    .field textarea { min-height:90px; resize:vertical; }
    .hero-band {
      width:100%; padding:16px 18px; background:linear-gradient(180deg,#191919 0%, #101010 100%); color:#fff;
      border-radius:22px 22px 0 0; display:flex; align-items:center; gap:10px;
    }
    .num-chip { width:26px; height:26px; border-radius:50%; background:var(--gold-700); color:#fff; display:grid; place-items:center; font-weight:800; font-size:13px; }
    .section { background:#fff; border:1px solid var(--line); border-radius:18px; overflow:hidden; }
    .section-head {
      width:100%; border:0; background:#fff; padding:18px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; transition:.18s ease;
    }
    .section-head:hover { background:linear-gradient(90deg,rgba(169,103,39,.16),rgba(13,29,67,.04)); }
    .section-head.active { background:linear-gradient(90deg,var(--gold-700),var(--gold-500)); color:#fff; }
    .section-body { display:none; padding:18px; }
    .section-body.open { display:block; }
    .section-badge { width:30px; height:30px; border-radius:10px; background:#2d6cc4; color:#fff; display:grid; place-items:center; font-weight:800; }
    .section-head.active .section-badge { background:#fff; color:var(--gold-700); }
    .group-note {
      width:100%; background:#f7f3ea; border:1px solid #e8ddbf; border-radius:16px; padding:12px 14px;
      color:#7b5830; font-size:13px; line-height:1.7;
    }
    .choice-wrap { display:flex; flex-wrap:wrap; gap:8px; }
    .choice {
      padding:8px 12px; border-radius:999px; background:#edf5fb; border:1px solid #d8e7f4; color:#29446f; font-size:12px; font-weight:800; cursor:pointer;
    }
    .choice.active { background:linear-gradient(90deg,var(--gold-700),var(--gold-500)); color:#fff; border-color:transparent; }
    .subtle { color:var(--muted); font-size:12px; line-height:1.5; }
    .doc-item, .backup-item, .message-item, .transport-item { padding:14px; border:1px solid var(--line); border-radius:16px; background:#fff; margin-bottom:10px; }
    .toast {
      position:fixed; left:18px; bottom:18px; background:#214f9a; color:#fff; padding:14px 18px; border-radius:16px;
      box-shadow:0 18px 26px rgba(0,0,0,.18); opacity:0; transform:translateY(12px); transition:.2s ease; pointer-events:none; z-index:50;
    }
    .toast.show { opacity:1; transform:translateY(0); }

    .workspace-tools { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
    .door-strip { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
    .door-chip { border:1px solid #d9e7f3; background:rgba(255,255,255,.92); color:var(--navy-800); padding:10px 14px; border-radius:999px; font-weight:800; cursor:pointer; }
    .door-chip.active { background:linear-gradient(90deg,var(--gold-700),var(--gold-500)); border-color:transparent; color:#fff; box-shadow:var(--shadow); }
    .modal, .landing-overlay {
      position:fixed; inset:0; background:rgba(10,22,51,.58); backdrop-filter:blur(6px); z-index:120;
      display:grid; place-items:center; padding:20px;
    }
    .modal-card {
      width:min(1100px, calc(100vw - 40px)); max-height:calc(100vh - 40px); overflow:auto; background:#fff;
      border-radius:26px; box-shadow:0 24px 40px rgba(0,0,0,.22);
    }
    .modal-head {
      padding:18px 20px; background:linear-gradient(90deg,var(--navy-900),var(--blue-700)); color:#fff;
      display:flex; justify-content:space-between; align-items:flex-start; gap:16px;
    }
    .modal-head h3 { margin:0 0 4px; font-size:22px; }
    .modal-head p { margin:0; color:rgba(255,255,255,.78); font-size:13px; }
    .modal-body { padding:20px; }
    .options { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
    .opt {
      width:100%; text-align:right; background:#fff; border:1px solid var(--line); border-radius:18px; padding:14px 16px;
      display:flex; justify-content:space-between; align-items:center; gap:14px; cursor:pointer;
    }
    .opt:hover { background:linear-gradient(180deg,#fffdf8,#f7f3ea); }
    .opt b { display:block; color:var(--navy-800); margin-bottom:4px; }
    .opt small { display:block; color:var(--muted); line-height:1.6; }
    .close {
      border:0; background:rgba(255,255,255,.14); color:#fff; width:38px; height:38px; border-radius:50%; cursor:pointer; font-size:18px;
    }
    .landing-screen {
      width:min(1360px, calc(100vw - 24px)); min-height:calc(100vh - 24px); background:#fff; border-radius:34px; overflow:hidden;
      box-shadow:0 28px 60px rgba(0,0,0,.24); display:grid; grid-template-columns:360px 1fr;
    }
    .landing-side {
      background:linear-gradient(180deg,#16120f 0%, #0f1f4a 35%, #0e2f73 100%); color:#fff; padding:30px 24px; display:flex; flex-direction:column;
    }
    .landing-side .logo { width:82px; height:82px; margin-bottom:18px; }
    .landing-side h2 { margin:0 0 8px; font-size:30px; }
    .landing-side p { margin:0; color:rgba(255,255,255,.78); line-height:1.9; }
    .landing-main {
      padding:34px; background:radial-gradient(circle at top left, rgba(255,255,255,.55), transparent 18%), linear-gradient(180deg,var(--sky-100),var(--sky-200));
      display:flex; flex-direction:column; gap:22px;
    }
    .landing-head h1 { margin:0 0 8px; color:var(--navy-900); font-size:44px; }
    .landing-head p { margin:0; color:#6f7d8e; line-height:1.9; }
    .door-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:18px; }
    .door-card {
      border:1px solid var(--line); background:rgba(255,255,255,.94); border-radius:26px; padding:22px; cursor:pointer; box-shadow:var(--shadow);
      display:flex; flex-direction:column; gap:12px; min-height:210px; transition:.18s ease;
    }
    .door-card:hover { transform:translateY(-2px); }
    .door-icon { width:58px; height:58px; border-radius:18px; display:grid; place-items:center; color:#fff; font-size:24px; font-weight:900; }
    .door-card h3 { margin:0; color:var(--navy-800); font-size:28px; }
    .door-card p { margin:0; color:var(--muted); line-height:1.8; }
    .door-tags { display:flex; gap:8px; flex-wrap:wrap; }
    .door-tags span { padding:7px 10px; border-radius:999px; font-size:12px; font-weight:800; background:#edf6ff; color:#24436f; }
    .mini-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; }
    .mini-tile { background:rgba(255,255,255,.94); border:1px solid var(--line); border-radius:20px; padding:16px; }
    .mini-tile h4 { margin:0 0 8px; color:var(--navy-800); }
    .mini-tile p { margin:0; color:var(--muted); line-height:1.7; font-size:13px; }
    .payment-type-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; margin-top:16px; }
    .payment-type-card {
      border:1px solid var(--line); background:#fff; border-radius:24px; padding:18px; cursor:pointer;
      box-shadow:var(--shadow); transition:.18s ease;
    }
    .payment-type-card:hover { transform:translateY(-2px); }
    .payment-type-card.active { color:#fff; border-color:transparent; }
    .payment-type-card .headline { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
    .payment-type-card .icon-box { width:48px; height:48px; border-radius:16px; display:grid; place-items:center; font-size:22px; font-weight:900; }
    .payment-type-card .meta { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; margin-top:16px; }
    .payment-type-card .meta div { border-radius:16px; padding:12px; background:#f7fafd; }
    .payment-type-card.active .meta div { background:rgba(255,255,255,.14); }
    .payment-type-card h3 { margin:0; font-size:20px; }
    .payment-type-card p { margin:5px 0 0; line-height:1.7; font-size:12px; }
    .payment-detail-card { margin-top:18px; }
    .record-grid { display:grid; gap:12px; margin-top:14px; }
    .record-item {
      display:flex; gap:14px; align-items:flex-start; padding:16px; border:1px solid var(--line);
      border-radius:20px; background:#fff;
    }
    .record-icon { width:48px; height:48px; border-radius:16px; display:grid; place-items:center; font-size:22px; font-weight:900; flex-shrink:0; }
    .record-tail { padding:10px 12px; border-radius:16px; font-size:12px; font-weight:900; flex-shrink:0; }
    .sort-bar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .sort-chip {
      border:1px solid #d8e7f4; background:#f4f8fc; color:#10295a; border-radius:999px; padding:10px 14px;
      font-weight:800; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:.18s ease;
    }
    .sort-chip.active { background:linear-gradient(90deg,var(--gold-700),var(--gold-500)); color:#fff; border-color:transparent; box-shadow:var(--shadow); }
    .accounting-hero {
      padding:16px 18px; border-radius:20px; background:linear-gradient(135deg,#1f335d,#123a78,#2f9a8e); color:#fff; margin-bottom:14px;
      display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap;
    }
    .accounting-hero h3 { margin:0 0 6px; font-size:24px; }
    .accounting-hero p { margin:0; color:rgba(255,255,255,.78); line-height:1.8; }
    .accounting-hero .hero-badge { background:rgba(255,255,255,.14); border-radius:16px; padding:12px 14px; font-weight:800; }

    .login-overlay {
      position:fixed; inset:0; background:linear-gradient(135deg, rgba(13,29,67,.86), rgba(18,58,120,.80), rgba(47,154,142,.76));
      backdrop-filter: blur(8px); z-index:160; display:grid; place-items:center; padding:24px;
    }
    .login-shell {
      width:min(1120px, calc(100vw - 32px)); min-height:min(720px, calc(100vh - 32px));
      display:grid; grid-template-columns:380px 1fr; background:rgba(255,255,255,.96); border-radius:34px; overflow:hidden;
      box-shadow:0 30px 70px rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.35);
    }
    .login-side {
      padding:34px 28px; color:#fff; background:linear-gradient(180deg,#16120f 0%, #0f1f4a 34%, #0e2f73 100%); display:flex; flex-direction:column;
    }
    .login-side .logo { width:96px; height:96px; margin-bottom:18px; }
    .login-side h2 { margin:0 0 10px; font-size:34px; }
    .login-side p { margin:0; color:rgba(255,255,255,.78); line-height:1.9; }
    .login-tags { display:flex; gap:8px; flex-wrap:wrap; margin-top:20px; }
    .login-tags span { padding:8px 10px; border-radius:999px; background:rgba(255,255,255,.12); color:#fff; font-size:12px; font-weight:800; }
    .login-main {
      padding:42px 40px; background:radial-gradient(circle at top left, rgba(255,255,255,.62), transparent 20%), linear-gradient(180deg,var(--sky-100),#f7fbff); display:flex; flex-direction:column; justify-content:center;
    }
    .login-main h1 { margin:0 0 10px; font-size:46px; color:var(--navy-900); }
    .login-main p { margin:0 0 18px; color:#6f7d8e; line-height:1.9; }
    .login-card {
      max-width:520px; background:#fff; border:1px solid var(--line); border-radius:28px; padding:24px; box-shadow:var(--shadow);
    }
    .login-card h3 { margin:0 0 14px; color:var(--navy-800); font-size:24px; }
    .login-grid { display:grid; gap:14px; }
    .login-card input { width:100%; border:1px solid #d9e7f3; border-radius:14px; padding:13px 14px; background:#fbfdff; }
    .login-help { margin-top:12px; padding:12px 14px; border-radius:16px; background:#f7f3ea; color:#7b5830; font-size:13px; line-height:1.8; }
    .login-error { margin-top:10px; color:#c65c54; font-weight:700; font-size:13px; }
    @media (max-width: 1200px) { .app { grid-template-columns:1fr; } .sidebar { position:relative; height:auto; } .stats { grid-template-columns:repeat(2,minmax(0,1fr)); } .fields { grid-template-columns:1fr; } .field.span-2 { grid-column:auto; } .payment-type-grid { grid-template-columns:1fr; } }
    @media (max-width: 760px) { .stats { grid-template-columns:1fr; } .head h2 { font-size:30px; } .search { width:100%; } }
  </style>
</head>
<body>
  <div class="app">
    <main class="content">
      <div class="content-shell">
        <div class="top">
          <div class="search"><input id="searchInput" placeholder="ابحث..." /><span class="icon">🔎</span></div>
          <div class="head"><div class="sub" id="pageSub">أمانة السر، قائمة الطلاب</div><h2 id="pageTitle">قائمة الطلاب</h2></div>
        </div>
        <div class="workspace-tools" id="workspaceTools"></div>
        <div class="door-strip" id="doorStrip"></div>

    function permissionNameForDoor(doorKey) {
      return { administration:'الإدارة', secretariat:'أمانة السر', exams:'الامتحانات', accounting:'المحاسبة' }[doorKey] || '';
    }

    function doorKeyForPage(page) {
      for (const [key, config] of Object.entries(doorConfig)) { if (config.pages.includes(page)) return key; }
      return 'administration';
    }

    function currentAuthenticatedUser() {
      return state.adminUsers.find(user => user.id === state.authenticatedUserId) || null;
    }

    function userHasPermissionForDoor(user, doorKey) {
      if (!user) return false;
      return (user.permissions || []).includes(permissionNameForDoor(doorKey));
    }

    function requestDoorAccess(doorKey, page = null) {
      const config = doorConfig[doorKey];
      if (!config) return;
      state.pendingDoorKey = doorKey;
      state.pendingPage = page || config.pages[0];
      state.isAuthenticated = false;
      state.loginError = '';
      state.loginDraft = { username:'admin', password:'admin' };
      renderLoginOverlay();
    }

    function currentDoorKey() {
      for (const [key, config] of Object.entries(doorConfig)) {
        if (config.pages.includes(state.page)) return key;
      }
      return 'administration';
    }

    function openDoor(doorKey) {
      const config = doorConfig[doorKey];
      if (!config) return;
      state.page = config.pages[0];
      state.showLanding = false;
      render();
    }

    function currentAcademicYear() {
      const now = new Date();
      const start = (now.getMonth() + 1) >= 9 ? now.getFullYear() : now.getFullYear() - 1;
      return `${start} / ${start + 1}`;
    }

    function studentGradeDisplay(student) {
      return (student.grade && String(student.grade).trim()) ? student.grade : (student.enrollmentGrade || '-');
    }

    function studentSectionDisplay(student) {
      return (student.section && String(student.section).trim()) ? student.section : '?';
    }

    function currentStudent() {
      return state.students.find(s => s.id === state.selectedStudentId) || state.students[0];
    }

    function toast(message, color='#214f9a') {
      const t = el('toast');
      t.textContent = message;
      t.style.background = color;
      t.classList.add('show');
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => t.classList.remove('show'), 2400);
    }

      const active = state.students.filter(s => s.status === 'نشط').length;
      el('statsBox').innerHTML = `
        <div class="stat"><div><div class="num">${females}</div><div class="label">إناث</div></div><div class="stat-ic c-rose">♀</div></div>
        <div class="stat"><div><div class="num">${males}</div><div class="label">ذكور</div></div><div class="stat-ic c-blue">♂</div></div>
        <div class="stat"><div><div class="num">${active}</div><div class="label">نشطون</div></div><div class="stat-ic c-green">✓</div></div>
        <div class="stat"><div><div class="num">${total}</div><div class="label">إجمالي الطلاب</div></div><div class="stat-ic c-gold">■</div></div>
      `;
    }

    function renderSidebar() {
      Object.entries(doorConfig).forEach(([key, config]) => {
        if (config.pages.includes(state.page)) state.openMenuGroups.add(key);
      });
      document.querySelectorAll('.menu-item').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.page === state.page);
      });
      document.querySelectorAll('.nav-body').forEach(body => {
        body.classList.toggle('open', state.openMenuGroups.has(body.dataset.body));
      });
      document.querySelectorAll('.nav-head').forEach(head => {
        const open = state.openMenuGroups.has(head.dataset.group);
        head.querySelector('span:last-child').textContent = open ? '▾' : '◂';
      });
    }

    function toggleNavGroup(group) {
      if (state.openMenuGroups.has(group)) state.openMenuGroups.delete(group);
      else state.openMenuGroups.add(group);
      renderSidebar();
    }

    function renderHeader() {
      const meta = pageMeta[state.page];
      el('pageTitle').textContent = meta[0];
      el('pageSub').textContent = meta[1];
      el('pageHint').textContent = meta[2];
      el('searchInput').value = state.search;
    }

    function compareStudentSortValues(firstValue, secondValue) {
      const firstNumber = parseInt(String(firstValue || '').trim(), 10);
      const secondNumber = parseInt(String(secondValue || '').trim(), 10);
      if (!Number.isNaN(firstNumber) && !Number.isNaN(secondNumber)) {
        return firstNumber - secondNumber;
      }
      return String(firstValue || '').localeCompare(String(secondValue || ''), 'ar', { numeric:true });
    }

    function compareStudentsByCriterion(a, b, criterion) {
      if (criterion === 'الصف') {
        return compareStudentSortValues(studentGradeDisplay(a), studentGradeDisplay(b));
      }
      if (criterion === 'الشعبة') {
        return compareStudentSortValues(studentSectionDisplay(a), studentSectionDisplay(b));
      }
      return String(a.name || '').localeCompare(String(b.name || ''), 'ar');
    }

    function toggleStudentSortCriterion(label) {
      const order = state.studentsSortOrder || [];
      const index = order.indexOf(label);
      if (index >= 0) {
        order.splice(index, 1);
        if (!order.length) order.push('الاسم');
        render();
        return;
      }
      if (order.length === 1 && order[0] === 'الاسم' && label !== 'الاسم') {
        state.studentsSortOrder = [label];
        render();
        return;
      }
      order.push(label);
      render();
    }

    function studentSortOrderLabel() {
      return (state.studentsSortOrder || ['الاسم']).join(' ← ');
    }

    function showStudentSortOrderDialog() {
      const options = ['الاسم', 'الصف', 'الشعبة'];
      let first = state.studentsSortOrder?.[0] || 'الاسم';
      let second = state.studentsSortOrder?.[1] || '';
      let third = state.studentsSortOrder?.[2] || '';
      const popup = document.createElement('div');
      popup.className = 'modal';

      function normalize(value) {
        return !value || value === 'بدون' ? '' : value;
      }

      function previewOrder() {
        const order = [];
        [first, second, third].forEach(value => {
          if (!value || order.includes(value)) return;
          order.push(value);
        });
        return order.length ? order.join(' ← ') : 'الاسم';
      }

      function renderDialog() {
        const optionMarkup = (selected) => ['بدون', ...options].map(option => `<option value="${option}" ${((selected || 'بدون')===option)?'selected':''}>${option}</option>`).join('');
        popup.innerHTML = `
          <div class="modal-card" style="width:min(760px, calc(100vw - 40px))">
            <div class="modal-head"><div><h3>ترتيب الفرز اليدوي</h3><p>اختر الأول ثم الثاني ثم الثالث بطريقة بسيطة وأنيقة.</p></div><button class="close" onclick="this.closest('.modal').remove()">✕</button></div>
            <div class="modal-body">
              <div class="fields">
                <div class="field"><label>الأول</label><select onchange="window.__studentSortDialog.first=this.value; window.__renderStudentSortDialog()">${optionMarkup(first)}</select></div>
                <div class="field"><label>الثاني</label><select onchange="window.__studentSortDialog.second=this.value; window.__renderStudentSortDialog()">${optionMarkup(second)}</select></div>
                <div class="field"><label>الثالث</label><select onchange="window.__studentSortDialog.third=this.value; window.__renderStudentSortDialog()">${optionMarkup(third)}</select></div>
              </div>
              <div class="group-note" style="margin-top:14px;background:#f7f3ea;border-color:#e8ddbf;color:#7b5830">الترتيب الحالي: <b>${previewOrder()}</b></div>
              <div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;margin-top:16px">
                <button class="btn soft" onclick="window.__studentSortDialog.first='الاسم'; window.__studentSortDialog.second=''; window.__studentSortDialog.third=''; window.__renderStudentSortDialog()">إعادة للوضع الافتراضي</button>
                <button class="btn primary" onclick="window.__applyStudentSortDialog()">تطبيق</button>
              </div>
            </div>
          </div>`;
      }

      window.__studentSortDialog = { first, second, third };
      window.__renderStudentSortDialog = () => {
        first = normalize(window.__studentSortDialog.first);
        second = normalize(window.__studentSortDialog.second);
        third = normalize(window.__studentSortDialog.third);
        renderDialog();
      };
      window.__applyStudentSortDialog = () => {
        const order = [];
        [first, second, third].forEach(value => {
          if (!value || order.includes(value)) return;
          order.push(value);
        });
        state.studentsSortOrder = order.length ? order : ['الاسم'];
        popup.remove();
        render();
        toast('تم تطبيق ترتيب الفرز اليدوي بنجاح.', '#2e7d46');
      };
      popup.addEventListener('click', (e)=>{ if(e.target===popup) popup.remove(); });
      document.body.appendChild(popup);
      renderDialog();
    }

    function filteredStudents() {
      const q = state.search.trim().toLowerCase();
      const result = state.students.filter(s => {
        if (!q) return true;
        return [s.name, s.serial, s.grade, s.guardianName, s.mobile, s.section].join(' ').toLowerCase().includes(q);
      });
      result.sort((a, b) => {
        for (const criterion of (state.studentsSortOrder || [])) {
          const compare = compareStudentsByCriterion(a, b, criterion);
          if (compare !== 0) return compare;
        }
        const byName = String(a.name || '').localeCompare(String(b.name || ''), 'ar');
        if (byName !== 0) return byName;
        return String(a.serial || '').localeCompare(String(b.serial || ''), 'ar', { numeric:true });
      });
      return result;
    }

    function openStudent(id, targetPage='form') {
      state.selectedStudentId = id;
      state.page = targetPage;
      render();
    }

    function sectionNames() {
      return [

        { id:'contact', title:'الاتصال والسكن', desc:'السكن والهواتف والإيميل' },
        { id:'transport_section', title:'النقل والمواصلات', desc:'الاشتراك بالمواصلات ومكان انتظار المدرسة' },

        { id:'guardian', title:'بيانات ولي الأمر', desc:'بيانات التواصل والطوارئ الخاصة بولي الأمر' },

      const items = sectionNames();
      const popup = document.createElement('div');
      popup.className = 'modal show';
      popup.innerHTML = `
        <div class="modal-card">
          <div class="modal-head">
            <div>
              <h3>ماذا تريد أن تعرفه عن الطالب؟</h3>
              <p>${student.name}</p>
            </div>
            <button class="close" onclick="this.closest('.modal').remove()">✕</button>
          </div>
          <div class="modal-body">
            <div class="options">
              ${items.map(item => `
                <button class="opt" onclick="openStudentSection(${student.id}, '${item.id}')">

                  <span>◂</span>
                </button>
              `).join('')}

          </div>
        </div>

    function openStudentSection(studentId, sectionId) {
      document.querySelectorAll('.modal').forEach(m => m.remove());
      state.selectedStudentId = studentId;
      state.page = 'form';
      state.openSections.clear();
      if (sectionId !== 'personal') state.openSections.add(sectionId);
      render();
      toast('تم فتح القسم المطلوب للطالب.', '#214f9a');
    }

    function handleSearch() {
      const q = state.search.trim().toLowerCase();
      if (!q) {
        toast('اكتب اسم الطالب أولًا في مربع البحث.', '#a76727');
        return;
      }
      const matches = state.students.filter(s => [s.name, s.serial, s.guardianName, s.mobile].join(' ').toLowerCase().includes(q));
      if (!matches.length) {
        toast('لم يتم العثور على طالب مطابق للبحث.', '#c65c54');
        return;
      }
      if (matches.length === 1) {
        showKnowledgeDialog(matches[0]);
        return;
      }
      const popup = document.createElement('div');
      popup.className = 'modal show';
      popup.innerHTML = `
        <div class="modal-card">
          <div class="modal-head">
            <div>
              <h3>نتائج البحث عن الطالب</h3>
              <p>اختر الطالب المقصود لعرض ما تريد معرفته عنه</p>
            </div>
            <button class="close" onclick="this.closest('.modal').remove()">✕</button>
          </div>
          <div class="modal-body">
            <div style="display:grid;gap:10px">
              ${matches.map(s => `
                <button class="opt" title="فتح أقسام الطالب" onclick="document.querySelectorAll('.modal').forEach(m=>m.remove()); showKnowledgeDialog(state.students.find(st=>st.id===${s.id}))">
                  <div style="display:flex;align-items:center;gap:12px">${studentAvatarHtml(s, 42)}<div><b>${s.name}</b><small>${s.serial} • ${s.grade}</small></div></div>
                  <span>◂</span>
                </button>
              `).join('')}
            </div>
          </div>
        </div>
      `;
      popup.addEventListener('click', (e) => { if (e.target === popup) popup.remove(); });
      document.body.appendChild(popup);
    }

    function studentRow(student) {
      return `
        <tr>
          <td>
            <div class="student">
              ${studentAvatarHtml(student, 44)}

            </div>
          </td>
        </tr>
      `;
    }

        return `<button class="sort-chip ${active?'active':''}" title="${active ? 'أولوية الفرز: ' + (index + 1) : 'إضافة معيار فرز'}" onclick="toggleStudentSortCriterion('${label}')">${icon} ${label}${active ? `<span style="display:inline-grid;place-items:center;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.22);color:#fff;font-size:10px;font-weight:900">${index + 1}</span>` : ''}</button>`;
      };
      return `
        <div class="toolbar">

            <span class="subtle" style="font-weight:700">يمكن اختيار أكثر من معيار، وأولوية الفرز حسب ترتيب الرقم الظاهر على الزر. الترتيب الحالي: ${studentSortOrderLabel()}</span>

    function sectionHeader(id, number, title) {

        <button class="section-head ${open ? 'active' : ''}" onclick="toggleSection('${id}')">

            <div class="section-badge">${number}</div>
          </div>
        </button>
      `;
    }

    function inputField(label, value, key, type='text', span2=false, placeholder='') {
      return `
        <div class="field ${span2 ? 'span-2' : ''}">
          <label>${label}</label>
          <input type="${type}" value="${value ?? ''}" placeholder="${placeholder || label}" oninput="updateField('${key}', this.value)" />
        </div>
      `;
    }

    function textareaField(label, value, key, span2=true) {
      const clearOnce = /ملاحظات|ملاحظة/.test(label);
      return `
        <div class="field ${span2 ? 'span-2' : ''}">
          <label>${label}</label>
          <textarea ${clearOnce ? 'data-clear-once="true"' : ''} onfocus="clearNoteFieldOnce(this)" oninput="updateField('${key}', this.value)">${value ?? ''}</textarea>
        </div>
      `;
    }

    function selectField(label, value, key, options, span2=false) {
      return `
        <div class="field ${span2 ? 'span-2' : ''}">
          <label>${label}</label>
          <select onchange="updateField('${key}', this.value)">
            ${options.map(opt => `<option ${value===opt ? 'selected' : ''}>${opt}</option>`).join('')}
          </select>
        </div>
      `;
    }

    function radioChips(label, value, key, options, span2=true) {
      return `
        <div class="field ${span2 ? 'span-2' : ''}">
          <label>${label}</label>
          <div class="choice-wrap">
            ${options.map(opt => `<button type="button" class="choice ${value===opt?'active':''}" onclick="setChoice('${key}','${opt}')">${opt}</button>`).join('')}
          </div>
        </div>
      `;
    }

    function multiChoiceField(label, values, keyPrefix, options, span2=true) {
      return `
        <div class="field ${span2 ? 'span-2' : ''}">
          <label>${label}</label>
          <div class="choice-wrap">
            ${options.map(opt => `<button type="button" class="choice ${values.includes(opt)?'active':''}" onclick="toggleMulti('${keyPrefix}','${opt}')">${opt}</button>`).join('')}
          </div>
        </div>

    }

    function mapSocialKeyBack(k) {
      return {
        normalLife:'حياة طبيعية', orphanFather:'يتيم الأب', orphanMother:'يتيم الأم', orphanParents:'يتيم الوالدين', onlyChild:'وحيد', livesSeparate:'يعيش في مكان مفصل عن العائلة'
      }[k];
    }
    function mapSocialLabelToKey(label) {
      return {
        'حياة طبيعية':'normalLife', 'يتيم الأب':'orphanFather', 'يتيم الأم':'orphanMother', 'يتيم الوالدين':'orphanParents', 'وحيد':'onlyChild', 'يعيش في مكان مفصل عن العائلة':'livesSeparate'
      }[label];
    }
    function mapHobbyKeyBack(k) {
      return { music:'موسيقا', drawing:'رسم', computer:'كمبيوتر', sports:'رياضة' }[k];
    }
    function mapHobbyLabelToKey(label) {
      return { 'موسيقا':'music', 'رسم':'drawing', 'كمبيوتر':'computer', 'رياضة':'sports' }[label];
    }
    function mapInitiativeKeyBack(k) {
      return { school:'مدرسية', financial:'مالية', kind:'عينية', projects:'اختراعات ومشاريع' }[k];
    }
    function mapInitiativeLabelToKey(label) {
      return { 'مدرسية':'school', 'مالية':'financial', 'عينية':'kind', 'اختراعات ومشاريع':'projects' }[label];
    }
    function mapDisabilityKeyBack(k) {
      return { visual:'بصرية', hearing:'سمعية', motor:'حركية', learning:'تعلم' }[k];
    }
    function mapDisabilityLabelToKey(label) {
      return { 'بصرية':'visual', 'سمعية':'hearing', 'حركية':'motor', 'تعلم':'learning' }[label];
    }

    function studentAccountingLinkedEntries(student) {
      const installments = state.invoices.filter(item => item.studentId === student.id).map(item => ({
        title: `قسط: ${item.title}`,
        subtitle: `${item.amount || 0} ${item.currency || ''} • ${item.date || 'بدون تاريخ'}`
      }));
      const donations = state.accountingDonations.filter(item => item.studentId === student.id).map(item => ({
        title: `تبرع: ${item.donationKind === 'عينية' ? (item.materialType || item.title) : item.title}`,
        subtitle: item.donationKind === 'عينية' ? `عينية • الكمية / العدد: ${item.quantity || '-'} • ${item.date || 'بدون تاريخ'}${item.note ? '<br>' + item.note : ''}` : `مادية • ${item.amount || 0} ${item.currency || ''} • ${item.date || 'بدون تاريخ'}`
      }));
      const aids = state.accountingAids.filter(item => item.studentId === student.id).map(item => ({
        title: `مساعدة: ${item.aidKind === 'عينية' ? (item.materialType || item.title) : item.title}`,
        subtitle: item.aidKind === 'عينية' ? `عينية • الكمية: ${item.quantity || '-'} • ${item.date || 'بدون تاريخ'}${item.note ? '<br>' + item.note : ''}` : `مادية • ${item.amount || 0} ${item.currency || ''} • ${item.date || 'بدون تاريخ'}`
      }));
      const receipts = state.receipts.filter(item => item.studentId === student.id).map(item => ({
        title: `مقبوض: ${item.title}`,
        subtitle: `${item.amount || 0} ${item.currency || ''} • ${item.date || 'بدون تاريخ'}${item.note ? '<br>' + item.note : ''}`
      }));
      return [...installments, ...donations, ...aids, ...receipts];
    }

        : (student.transportSubscription === 'نعم' ? `<div class="group-note" style="margin-bottom:12px">لم يتم تسجيل إشعار دفع رسوم النقل من باب المحاسبة حتى الآن.</div>` : '');
      return `

          <h3>الأقساط والمدفوعات</h3>
          <div class="group-note">تم إخفاء سجل رسوم 1 وكل ما يشابهه هنا، وأصبح العرض يعتمد فقط على السجلات التي تتم إضافتها من باب المحاسبة.</div>

            ${linkedEntries.length ? linkedEntries.map(item => `<div class="doc-item"><strong>${item.title}</strong><div class="subtle">${item.subtitle}</div></div>`).join('') : '<div class="doc-item"><div class="subtle">لا توجد سجلات محاسبية مرتبطة حتى الآن.</div></div>'}
          </div>
        </div>

    function updateLoginField(key, value) {
      state.loginDraft[key] = value;
    }

    function attemptLogin() {
      const { username, password } = state.loginDraft;
      const user = state.adminUsers.find(item => item.username === username && item.password === password);
      if (!user) {
        state.loginError = 'اسم المستخدم أو كلمة المرور غير صحيحة.';
        renderLoginOverlay();
        return;
      }
      if (!userHasPermissionForDoor(user, state.pendingDoorKey)) {
        state.loginError = 'هذا المستخدم لا يملك صلاحية الدخول إلى هذا الباب.';
        renderLoginOverlay();
        return;
      }
      state.isAuthenticated = true;
      state.authenticatedUserId = user.id;
      state.loginError = '';
      state.showLanding = false;
      state.page = state.pendingPage || doorConfig[state.pendingDoorKey].pages[0];
      render();
      toast('تم تسجيل الدخول بنجاح.', '#2e7d46');
    }

    function logoutApp() {
      state.isAuthenticated = false;
      state.authenticatedUserId = null;
      state.loginDraft = { username: 'admin', password: 'admin' };
      state.loginError = '';
      render();
    }

    function renderLoginOverlay() {
      const mount = el('loginMount');
      if (state.isAuthenticated) {
        mount.innerHTML = '';
        return;
      }
      const requestedDoorLabel = doorConfig[state.pendingDoorKey]?.label || 'النظام';
      mount.innerHTML = `
        <div class="login-overlay">
          <div class="login-shell">
            <div class="login-side">
              <div class="logo"><img src="image/logo.jpg" alt="logo" onerror="this.onerror=null;this.src='assets/logo.jpg'; if(!this.complete||this.naturalWidth===0){this.src='logo.jpg';}"></div>
              <h2>مدرسة روز التعليمية</h2>
              <p>لوحة دخول المستخدمين إلى النظام الإداري المتكامل. تم اعتماد الألوان والهوية البصرية من شعار المدرسة الرسمي.</p>
              <div class="login-tags">
                <span>أمانة السر</span>
                <span>المحاسبة</span>
                <span>الامتحانات</span>
                <span>الإدارة</span>
              </div>
              <div class="login-help" style="margin-top:auto">
                الباب المطلوب: <b>${requestedDoorLabel}</b><br>
                بيانات الدخول الحالية للاختبار:<br>
                <b>اسم المستخدم:</b> admin<br>
                <b>كلمة المرور:</b> admin
              </div>
            </div>
            <div class="login-main">
              <h1>تسجيل الدخول</h1>
              <p>أدخل بيانات المستخدم المعيّنة من الإدارة للوصول إلى الباب المحدد وصلاحياته فقط.</p>
              <div class="login-card">
                <h3>لوحة دخول المستخدمين</h3>
                <div class="login-grid">
                  <div>
                    <label class="subtle" style="display:block;margin-bottom:8px;font-weight:800">اسم المستخدم</label>
                    <input type="text" value="${escapeHtml(state.loginDraft.username)}" oninput="updateLoginField('username', this.value)">
                  </div>
                  <div>
                    <label class="subtle" style="display:block;margin-bottom:8px;font-weight:800">كلمة المرور</label>
                    <input type="password" value="${escapeHtml(state.loginDraft.password)}" oninput="updateLoginField('password', this.value)" onkeydown="if(event.key==='Enter') attemptLogin()">
                  </div>
                </div>
                <div class="login-help">
                  الهوية اللونية المعتمدة: كحلي، أزرق، ذهبي، أخضر، وأبيض بدرجات هادئة متناسقة مع الشعار.
                </div>
                ${state.loginError ? `<div class="login-error">${state.loginError}</div>` : ''}
                <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:18px">
                  <button class="btn primary" onclick="attemptLogin()">دخول</button>
                  <button class="btn soft" onclick="state.loginDraft={username:'admin',password:'admin'}; state.loginError=''; renderLoginOverlay();">إعادة تعيين</button>
                </div>
              </div>
            </div>
          </div>
        </div>`;
    }

    function renderLandingOverlay() {
      const mount = el('landingMount');
      if (!state.showLanding) {
        mount.innerHTML = '';
        return;
      }
      mount.innerHTML = `
        <div class="landing-overlay">

>الغاء</button></div><div style="margin-top:16px;display:grid;gap:10px">${state.adminUsers.map(user => `<button class="opt" onclick="selectAdminUser(${user.id})"><div><b>${user.username}</b><small>${user.email} • ${user.mobile}<br>${user.permissions.join('، ')}</small></div><span>${state.selectedAdminUserId===user.id?'✓':'◂'}</span></button>`).join('') || '<div class="group-note">لا يوجد مستخدمون بعد.</div>'}</div></div>

    function resetAdminUserDraft() {
      state.selectedAdminUserId = null;
      state.adminUserDraft = { username: '', password: '', confirmPassword: '', email: '', mobile: '', permissions: [] };
    }

    function updateAdminUserField(key, value) {
      state.adminUserDraft[key] = value;
    }

    function updateSchoolIdentityField(key, value) {
      state.schoolIdentity[key] = value;
    }

    function saveSchoolIdentityPreview() {
      toast('تم حفظ بيانات المدرسة واعتمادات الجلاء داخل المعاينة التفاعلية.', '#2e7d46');
      render();
    }

    function toggleAdminPermission(permission) {
      const permissions = state.adminUserDraft.permissions || [];
      const index = permissions.indexOf(permission);
      if (index >= 0) permissions.splice(index, 1); else permissions.push(permission);
      render();
    }

    function selectAdminUser(id) {
      const user = state.adminUsers.find(item => item.id === id);
      if (!user) return;
      state.selectedAdminUserId = id;
      state.adminUserDraft = { ...user, permissions: [...user.permissions] };
      render();
    }

    function validateAdminUserDraft() {
      const draft = state.adminUserDraft;
      if (!draft.username || !draft.email || !draft.password || !draft.confirmPassword || !draft.mobile) {
        toast('يجب إدخال جميع المعلومات المطلوبة.', '#c65c54');
        return false;
      }
      if ((draft.password || '') !== (draft.confirmPassword || '')) {
        toast('كلمة المرور وتأكيدها غير متطابقين.', '#c65c54');
        return false;
      }
      if (!(draft.permissions || []).length) {
        toast('يجب تحديد صلاحية واحدة على الأقل.', '#c65c54');
        return false;
      }
      return true;
    }

    function saveAdminUser() {
      const draft = state.adminUserDraft;
      if (!validateAdminUserDraft()) return;
      state.adminUsers.unshift({
        id: Date.now(),
        username: draft.username || 'user',
        password: draft.password || '',
        confirmPassword: draft.confirmPassword || '',
        email: draft.email || '',
        mobile: draft.mobile || '',
        permissions: [...(draft.permissions || [])],
      });
      resetAdminUserDraft();
      render();
      toast('تم حفظ المستخدم بنجاح.', '#2e7d46');
    }

    function editAdminUser() {
      if (!state.selectedAdminUserId) {
        toast('اختر مستخدمًا أولًا للتعديل.', '#a76727');
        return;
      }
      const draft = state.adminUserDraft;
      if (!validateAdminUserDraft()) return;
      const index = state.adminUsers.findIndex(item => item.id === state.selectedAdminUserId);
      if (index >= 0) {
        state.adminUsers[index] = { ...draft, id: state.selectedAdminUserId, permissions: [...(draft.permissions || [])] };
      }
      render();
      toast('تم تعديل المستخدم بنجاح.', '#2e7d46');
    }

    function deleteAdminUser() {
      if (!state.selectedAdminUserId) {
        toast('اختر مستخدمًا أولًا للحذف.', '#c65c54');
        return;
      }
      state.adminUsers = state.adminUsers.filter(item => item.id !== state.selectedAdminUserId);
      resetAdminUserDraft();
      render();
      toast('تم حذف المستخدم بنجاح.', '#c65c54');
    }

    function cancelAdminUser() {
      resetAdminUserDraft();
      render();
      toast('تم إلغاء التعديل.', '#214f9a');
    }

    function defaultExamSubjects(student) {
      const gradeNumber = parseInt(student.enrollmentGrade || '0', 10) || 0;
      const primary = ['اللغة العربية','اللغة الإنجليزية','الرياضيات','العلوم','التربية الدينية','الدراسات الاجتماعية','المعلوماتية','الفنون','الموسيقا','الرياضة'];
      const middle = ['اللغة العربية','اللغة الإنجليزية','اللغة الفرنسية','الرياضيات','العلوم','الفيزياء','الكيمياء','التربية الدينية','الاجتماعيات','المعلوماتية','الفنون','الرياضة'];
      const scientific = ['اللغة العربية','اللغة الإنجليزية','اللغة الفرنسية','الرياضيات','الفيزياء','الكيمياء','علم الأحياء','التربية الدينية','الوطنية','المعلوماتية','الرياضة'];
      const literary = ['اللغة العربية','اللغة الإنجليزية','اللغة الفرنسية','التاريخ','الجغرافيا','الفلسفة','التربية الدينية','الوطنية','المعلوماتية','الرياضة'];
      if (gradeNumber > 0 && gradeNumber <= 6) return primary;
      if (gradeNumber > 0 && gradeNumber <= 9) return middle;
      if ((student.grade || '').includes('علمي')) return scientific;
      if ((student.grade || '').includes('أدبي')) return literary;
      return gradeNumber >= 10 ? scientific : middle;
    }

    function studentExamSubjects(student) {
      const subjects = [];
      const append = (subject) => {
        const value = String(subject || '').trim();
        if (!value || subjects.includes(value)) return;
        subjects.push(value);
      };
      defaultExamSubjects(student).forEach(append);
      state.examSchedule.filter(exam => (exam.grade || '').trim() === (student.grade || '').trim() || String(exam.grade || '').includes(student.enrollmentGrade || '')).forEach(exam => append(exam.title));
      state.examResults.filter(result => result.studentId === student.id).forEach(result => append(result.subject));
      return subjects;
    }

    function examResultForSubject(student, subject) {
      return state.examResults.find(result => result.studentId === student.id && result.subject === subject) || {
        studentId: student.id,
        subject,
        firstTermWork: 0,
        firstTermExam: 0,
        secondTermWork: 0,
        secondTermExam: 0,
        isManuallyReviewed: false,
      };
    }

    function isExamReviewed(entry) {
      return entry?.isManuallyReviewed === true;
    }

    function examFirstTotal(entry) { return (parseFloat(entry.firstTermWork || 0) || 0) + (parseFloat(entry.firstTermExam || 0) || 0); }
    function examSecondTotal(entry) { return (parseFloat(entry.secondTermWork || 0) || 0) + (parseFloat(entry.secondTermExam || 0) || 0); }
    function examFinalAverage(entry) { return (examFirstTotal(entry) + examSecondTotal(entry)) / 2; }
    function formatExamNumber(value) {
      const number = parseFloat(value || 0) || 0;
      return Number.isInteger(number) ? String(number) : number.toFixed(2);
    }
    function completedExamSubjects(student) {
      return state.examResults.filter(entry => entry.studentId === student.id && (examFirstTotal(entry) > 0 || examSecondTotal(entry) > 0)).length;
    }
    function examAverageForStudent(student) {
      const items = state.examResults.filter(entry => entry.studentId === student.id && (examFirstTotal(entry) > 0 || examSecondTotal(entry) > 0));
      if (!items.length) return 0;
      return items.reduce((sum, entry) => sum + examFinalAverage(entry), 0) / items.length;
    }

    function examFirstEntered(entry) { return (parseFloat(entry.firstTermWork || 0) || 0) !== 0 || (parseFloat(entry.firstTermExam || 0) || 0) !== 0; }
    function examSecondEntered(entry) { return (parseFloat(entry.secondTermWork || 0) || 0) !== 0 || (parseFloat(entry.secondTermExam || 0) || 0) !== 0; }
    function allFirstTermEntered(student, override=null) {
      const subjects = studentExamSubjects(student);
      if (!subjects.length) return false;
      return subjects.every(subject => {
        const entry = override && override.subject === subject ? override : examResultForSubject(student, subject);
        return examFirstEntered(entry);
      });
    }
    function allSecondTermEntered(student, override=null) {
      const subjects = studentExamSubjects(student);
      if (!subjects.length) return false;
      return subjects.every(subject => {
        const entry = override && override.subject === subject ? override : examResultForSubject(student, subject);
        return examSecondEntered(entry);
      });
    }

    function saveExamSubjectResult(studentId, subject, firstTermWork, firstTermExam, secondTermWork, secondTermExam, isManuallyReviewed = null) {
      const current = state.examResults.find(entry => entry.studentId === studentId && entry.subject === subject) || {
        isManuallyReviewed: false,
      };
      const payload = {
        studentId,
        subject,
        firstTermWork: parseFloat(firstTermWork || 0) || 0,
        firstTermExam: parseFloat(firstTermExam || 0) || 0,
        secondTermWork: parseFloat(secondTermWork || 0) || 0,
        secondTermExam: parseFloat(secondTermExam || 0) || 0,
        isManuallyReviewed: isManuallyReviewed === null ? current.isManuallyReviewed === true : isManuallyReviewed === true,
      };
      const index = state.examResults.findIndex(entry => entry.studentId === studentId && entry.subject === subject);
      if (index >= 0) state.examResults[index] = payload;
      else state.examResults.push(payload);
    }

    function toggleExamSubjectReviewed(subject) {
      const student = currentStudent();
      const entry = examResultForSubject(student, subject);
      const reviewed = !isExamReviewed(entry);
      saveExamSubjectResult(student.id, subject, entry.firstTermWork, entry.firstTermExam, entry.secondTermWork, entry.secondTermExam, reviewed);
      render();
      toast(reviewed ? 'تم وضع علامة تدقيق المادة.' : 'تم إلغاء علامة تدقيق المادة.', reviewed ? '#2e7d46' : '#214f9a');
    }

    function reviewedExamSubjectsCount(student) {
      return studentExamSubjects(student).filter(subject => isExamReviewed(examResultForSubject(student, subject))).length;
    }

    function visibleExamSubjects(student) {
      const subjects = studentExamSubjects(student);
      if (!state.examShowOnlyUnreviewed) return subjects;
      return subjects.filter(subject => !isExamReviewed(examResultForSubject(student, subject)));
    }

    function markAllExamSubjectsReviewed() {
      const student = currentStudent();
      const subjects = studentExamSubjects(student);
      if (!subjects.length) {
        toast('لا توجد مواد لهذا الطالب لتدقيقها.', '#c65c54');
        return;
      }
      subjects.forEach(subject => {
        const entry = examResultForSubject(student, subject);
        saveExamSubjectResult(student.id, subject, entry.firstTermWork, entry.firstTermExam, entry.secondTermWork, entry.secondTermExam, true);
      });
      render();
      toast('تم التدقيق على كل المواد للطالب بنجاح.', '#2e7d46');
    }

    function safeBulkFileSegment(value) {
      return String(value || 'all')
        .trim()
        .replace(/\s+/g, '_')
        .replace(/[^\w\u0600-\u06FF-]+/g, '_')
        .replace(/_+/g, '_')
        .replace(/^_+|_+$/g, '') || 'all';
    }

    function bulkExamReportsTitle(grade, section, count) {
      const gradeLabel = grade === 'الكل' ? 'كل الصفوف' : `الصف ${grade}`;
      const sectionLabel = section === 'الكل' ? 'كل الشعب' : `الشعبة ${section}`;
      return `الجلاءات الجماعية - ${gradeLabel} - ${sectionLabel} (${count})`;
    }

    function bulkExamReportsFileName(grade, section, count) {
      const now = new Date();
      const pad = (value) => String(value).padStart(2, '0');
      const stamp = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
      return `bulk_exam_reports_grade_${safeBulkFileSegment(grade === 'الكل' ? 'all_grades' : grade)}_section_${safeBulkFileSegment(section === 'الكل' ? 'all_sections' : section)}_${count}_reports_${stamp}.pdf`;
    }

    function showBulkExamReportsDialog() {
      let selectedGrade = 'الكل';
      let selectedSection = 'الكل';
      const popup = document.createElement('div');
      popup.className = 'modal';

        return ['الكل', ...new Set(state.students.map(student => studentGradeDisplay(student)).filter(Boolean))];
      }

        return ['الكل', ...new Set(state.students.map(student => studentSectionDisplay(student)).filter(Boolean))];
      }

        return state.students.filter(student => {
          if (selectedGrade !== 'الكل' && studentGradeDisplay(student) !== selectedGrade) return false;

                <div class="field"><label>الشعبة</label><select onchange="window.__bulkExamSection=this.value; window.__refreshBulkExamDialog()">${sectionOptions().map(opt => `<option value="${opt}" ${selectedSection===opt?'selected':''}>${opt === 'الكل' ? opt : 'الشعبة ' + opt}</option>`).join('')}</select></div>

              <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">${list.length ? `<button class="btn soft" onclick="window.__previewBulkExamAll()">معاينة جماعية</button><button class="btn primary" onclick="window.__printBulkExamAll()">طباعة جماعية</button>` : ''}</div>
              <div style="display:grid;gap:10px;margin-top:12px">${list.length ? list.map(student => `<div class="doc-item"><div style="display:flex;justify-content:space-between;align-items:center;gap:12px"><div><strong>${student.name}</strong><div class="subtle">${studentGradeDisplay(student)} • الشعبة ${studentSectionDisplay(student)}</div></div><div style="display:flex;gap:8px"><button class="btn soft" onclick="window.__previewBulkExamStudent(${student.id})">معاينة</button><button class="btn primary" onclick="window.__printBulkExamStudent(${student.id})">طباعة</button></div></div></div>`).join('') : '<div class="group-note">لا توجد جلاءات مطابقة للصف والشعبة المحددين.</div>'}</div>
            </div>
          </div>`;
        window.__previewBulkExamAll = () => { popup.remove(); previewBulkExamReportsDialog(list, title, fileName); };
        window.__printBulkExamAll = () => { popup.remove(); printBulkExamReports(list, title, fileName); };
      }
      window.__bulkExamGrade = selectedGrade;
      window.__bulkExamSection = selectedSection;
      window.__refreshBulkExamDialog = () => { selectedGrade = window.__bulkExamGrade; selectedSection = window.__bulkExamSection; renderDialog(); };
      window.__previewBulkExamStudent = (id) => { changeStudent(id); popup.remove(); previewExamReportDialog(); };
      window.__printBulkExamStudent = (id) => { changeStudent(id); popup.remove(); printExamReport(); };
      popup.addEventListener('click', (e)=>{ if(e.target===popup) popup.remove(); });
      document.body.appendChild(popup);
      renderDialog();

    function showExamSubjectDialog(subject) {
      const student = currentStudent();
      const entry = examResultForSubject(student, subject);
      const popup = document.createElement('div');
      popup.className = 'modal';
      let reviewedManually = isExamReviewed(entry);

      function currentValues() {
        return {
          firstWork: popup.querySelector('#examFirstWork')?.value || '0',
          firstExam: popup.querySelector('#examFirstExam')?.value || '0',
          secondWork: popup.querySelector('#examSecondWork')?.value || '0',
          secondExam: popup.querySelector('#examSecondExam')?.value || '0',
        };
      }

      function refreshTotals() {
        const values = currentValues();
        const firstTotal = (parseFloat(values.firstWork || 0) || 0) + (parseFloat(values.firstExam || 0) || 0);
        const secondTotal = (parseFloat(values.secondWork || 0) || 0) + (parseFloat(values.secondExam || 0) || 0);
        const finalAverage = (firstTotal + secondTotal) / 2;
        const firstTarget = popup.querySelector('#examFirstTotal');
        const secondTarget = popup.querySelector('#examSecondTotal');
        const finalTarget = popup.querySelector('#examFinalAverage');
        if (firstTarget) firstTarget.textContent = formatExamNumber(firstTotal);
        if (secondTarget) secondTarget.textContent = formatExamNumber(secondTotal);
        if (finalTarget) finalTarget.textContent = `(${formatExamNumber(firstTotal)} + ${formatExamNumber(secondTotal)}) ÷ 2 = ${formatExamNumber(finalAverage)}`;
      }

      function persist(edited) {
        const values = currentValues();
        const override = {
          studentId: student.id,
          subject,
          firstTermWork: parseFloat(values.firstWork || 0) || 0,
          firstTermExam: parseFloat(values.firstExam || 0) || 0,
          secondTermWork: parseFloat(values.secondWork || 0) || 0,
          secondTermExam: parseFloat(values.secondExam || 0) || 0,
          isManuallyReviewed: reviewedManually,
        };
        const beforeFirst = allFirstTermEntered(student);
        const beforeSecond = allSecondTermEntered(student);
        const afterFirst = allFirstTermEntered(student, override);
        const afterSecond = allSecondTermEntered(student, override);
        saveExamSubjectResult(student.id, subject, values.firstWork, values.firstExam, values.secondWork, values.secondExam, reviewedManually);
        popup.remove();
        render();
        const messages = [];
        if (!beforeFirst && afterFirst) messages.push('تم إدخال جميع درجات مواد الفصل الأول للطالب.');
        if (!beforeSecond && afterSecond) messages.push('تم إدخال جميع درجات مواد الفصل الثاني للطالب.');
        if (messages.length) showExamCompletionDialog(messages);
        else toast(edited ? `تم تعديل درجات مادة ${subject} بنجاح.` : `تم حفظ درجات مادة ${subject} بنجاح.`, '#2e7d46');
      }

      popup.innerHTML = `
        <div class="modal-card">
          <div class="modal-head"><div><h3>${subject}</h3><p>${student.name} • ${studentGradeDisplay(student)} • الشعبة ${studentSectionDisplay(student)}</p></div><button class="close" onclick="this.closest('.modal').remove()">✕</button></div>
          <div class="modal-body">
            <div class="card-box" style="margin-bottom:14px;background:#f4f8fc">
              <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
                <div style="display:flex;align-items:center;gap:10px">
                  <span id="examReviewedIcon" style="font-size:20px;color:${reviewedManually ? '#1e7a43' : '#7b8897'}">${reviewedManually ? '✔' : '○'}</span>
                  <strong style="color:#10295a">علامة تدقيق المادة اليدوية</strong>
                </div>
                <button id="examReviewedToggle" class="btn ${reviewedManually ? 'soft' : 'primary'}" title="${reviewedManually ? 'تم تدقيق المادة' : 'وضع علامة تدقيق المادة'}" onclick="window.__toggleExamReviewedInDialog()">${reviewedManually ? 'إلغاء التدقيق' : 'تدقيق المادة'}</button>
              </div>
            </div>
            <div class="card-box" style="margin-bottom:14px">
              <h3>درجات الفصل الأول</h3>
              <div class="fields">
                <div class="field"><label>درجة الأعمال</label><input id="examFirstWork" type="text" inputmode="decimal" value="${formatExamNumber(entry.firstTermWork)}"></div>
                <div class="field"><label>درجة الامتحان</label><input id="examFirstExam" type="text" inputmode="decimal" value="${formatExamNumber(entry.firstTermExam)}"></div>
              </div>
              <div class="group-note" style="margin-top:12px">محصلة الفصل الأول: <span id="examFirstTotal">0</span></div>
              <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
                <button class="btn primary" id="examSaveFirst">حفظ</button>
                <button class="btn soft" id="examEditFirst">تعديل</button>
                <button class="btn soft" id="examCancelFirst">إلغاء</button>
              </div>
            </div>
            <div class="card-box" style="margin-bottom:14px">
              <h3>درجات الفصل الثاني</h3>
              <div class="fields">
                <div class="field"><label>درجة الأعمال</label><input id="examSecondWork" type="text" inputmode="decimal" value="${formatExamNumber(entry.secondTermWork)}"></div>
                <div class="field"><label>درجة الامتحان</label><input id="examSecondExam" type="text" inputmode="decimal" value="${formatExamNumber(entry.secondTermExam)}"></div>
              </div>
              <div class="group-note" style="margin-top:12px">محصلة الفصل الثاني: <span id="examSecondTotal">0</span></div>
              <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
                <button class="btn primary" id="examSaveSecond">حفظ</button>
                <button class="btn soft" id="examEditSecond">تعديل</button>
                <button class="btn soft" id="examCancelSecond">إلغاء</button>
              </div>
            </div>
            <div class="card-box">
              <h3>المحصلة النهائية للمادة</h3>
              <div class="group-note"><span id="examFinalAverage"></span></div>
            </div>
          </div>
        </div>`;

      window.__toggleExamReviewedInDialog = () => {
        reviewedManually = !reviewedManually;
        const icon = popup.querySelector('#examReviewedIcon');
        const button = popup.querySelector('#examReviewedToggle');
        if (icon) {
          icon.textContent = reviewedManually ? '✔' : '○';
          icon.style.color = reviewedManually ? '#1e7a43' : '#7b8897';
        }
        if (button) {
          button.textContent = reviewedManually ? 'إلغاء التدقيق' : 'تدقيق المادة';
          button.title = reviewedManually ? 'تم تدقيق المادة' : 'وضع علامة تدقيق المادة';
          button.className = `btn ${reviewedManually ? 'soft' : 'primary'}`;
        }
      };
      popup.addEventListener('click', (e)=>{ if(e.target===popup) popup.remove(); });
      document.body.appendChild(popup);

      ['examFirstWork','examFirstExam','examSecondWork','examSecondExam'].forEach(id => {
        popup.querySelector(`#${id}`)?.addEventListener('input', refreshTotals);
      });
      popup.querySelector('#examSaveFirst')?.addEventListener('click', () => persist(false));
      popup.querySelector('#examEditFirst')?.addEventListener('click', () => persist(true));
      popup.querySelector('#examCancelFirst')?.addEventListener('click', () => popup.remove());
      popup.querySelector('#examSaveSecond')?.addEventListener('click', () => persist(false));
      popup.querySelector('#examEditSecond')?.addEventListener('click', () => persist(true));
      popup.querySelector('#examCancelSecond')?.addEventListener('click', () => popup.remove());
      refreshTotals();
    }

          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn primary" onclick="createBackup()">إنشاء نسخة احتياطية الآن</button>

          </div>

          <div class="stats" style="margin-bottom:16px">

            <div class="stat"><div><div class="num">${state.students.length}</div><div class="label">عدد الطلاب الحالي</div></div><div class="stat-ic c-blue">👥</div></div>
            <div class="stat"><div><div class="num">محلي</div><div class="label">نوع الحفظ</div></div><div class="stat-ic c-green">✓</div></div>

        </div>
      `;
